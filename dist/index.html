<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmony Engine — Music Station</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    color: #aaaacc;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    color: #00ffcc;
    font-size: 28px;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .subtitle {
    color: #555577;
    font-size: 12px;
    margin-bottom: 24px;
  }

  /* Visualizer canvas */
  #vizCanvas {
    width: 600px;
    height: 600px;
    border: 1px solid #1a1a3a;
    border-radius: 8px;
    margin-bottom: 20px;
    background: #0a0a0f;
  }

  /* Status bar */
  .status {
    display: flex;
    gap: 24px;
    margin-bottom: 20px;
    font-size: 13px;
  }
  .status .label { color: #555577; }
  .status .value { color: #00ffcc; font-weight: bold; }
  .status .phase-value { color: #7b2fff; font-weight: bold; text-transform: uppercase; }

  /* Controls grid */
  .controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 640px;
    margin-bottom: 20px;
  }
  .panel {
    background: #0f0f1a;
    border: 1px solid #1a1a3a;
    border-radius: 8px;
    padding: 16px;
  }
  .panel h2 {
    color: #7b2fff;
    font-size: 13px;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Buttons */
  .btn {
    background: #1a1a3a;
    color: #00ffcc;
    border: 1px solid #00ffcc33;
    border-radius: 4px;
    padding: 10px 20px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
    min-width: 80px;
  }
  .btn:hover { background: #00ffcc22; }
  .btn:active { background: #00ffcc44; }
  .btn.primary { background: #00ffcc; color: #0a0a0f; font-weight: bold; }
  .btn.primary:hover { background: #00ddaa; }
  .btn.danger { border-color: #ff336644; color: #ff3366; }
  .btn.danger:hover { background: #ff336622; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

  /* Sliders */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .slider-row label {
    color: #555577;
    font-size: 12px;
    min-width: 70px;
  }
  .slider-row input[type=range] {
    flex: 1;
    accent-color: #00ffcc;
  }
  .slider-row .slider-val {
    color: #00ffcc;
    font-size: 12px;
    min-width: 36px;
    text-align: right;
  }

  /* Palette select */
  select {
    background: #1a1a3a;
    color: #aaaacc;
    border: 1px solid #1a1a3a;
    border-radius: 4px;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 13px;
    width: 100%;
    margin-bottom: 10px;
  }

  /* Phase pills */
  .phase-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .phase-pill {
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: 1px solid #1a1a3a;
    color: #555577;
    transition: all 0.2s;
  }
  .phase-pill.active {
    border-color: #7b2fff;
    color: #7b2fff;
    background: #7b2fff22;
  }
  .phase-pill:hover { border-color: #7b2fff88; }
  .phase-pill.cycle-active {
    border-color: #00ffcc;
    color: #00ffcc;
    background: #00ffcc22;
  }
  .phase-pills.cycle-locked .phase-pill { opacity: 0.3; cursor: default; pointer-events: none; }
  .phase-pills.cycle-locked .phase-pill.cycle-active { opacity: 1; pointer-events: auto; }
  .slider-row.dimmed label, .slider-row.dimmed .slider-val { opacity: 0.4; }
  .slider-row.dimmed input[type=range] { opacity: 0.4; pointer-events: none; }
</style>
</head>
<body>

<h1>HARMONY ENGINE</h1>
<p class="subtitle">Procedural music station — extracted from DemoShooter</p>

<canvas id="vizCanvas" width="600" height="600"></canvas>

<div class="status">
  <span><span class="label">Beat</span> <span class="value" id="statBeat">0</span></span>
  <span><span class="label">Phase</span> <span class="phase-value" id="statPhase">—</span></span>
  <span><span class="label">DC</span> <span class="value" id="statDC">0.00</span></span>
  <span><span class="label">BPM</span> <span class="value" id="statBPM">—</span></span>
  <span><span class="label">Palette</span> <span class="value" id="statPalette">—</span></span>
  <span><span class="label">Seed</span> <span class="value" id="statSeed">—</span></span>
</div>

<div class="controls">
  <!-- Transport -->
  <div class="panel">
    <h2>Transport</h2>
    <div class="btn-row">
      <button class="btn primary" id="btnPlay" onclick="doPlay()">PLAY</button>
      <button class="btn" id="btnPause" onclick="doPause()">PAUSE</button>
      <button class="btn danger" id="btnStop" onclick="doStop()">STOP</button>
    </div>
    <label style="font-size:12px; color:#555577;">Palette</label>
    <select id="selPalette">
      <option value="-1">Random</option>
    </select>
    <div class="slider-row">
      <label>Volume</label>
      <input type="range" min="0" max="100" value="80" id="slVolume" oninput="onVolume(this.value)">
      <span class="slider-val" id="valVolume">80%</span>
    </div>
    <div class="slider-row">
      <label>BPM</label>
      <input type="range" min="60" max="200" step="1" value="120" id="slBPM" oninput="onBPM(this.value)">
      <span class="slider-val" id="valBPM">Auto</span>
    </div>
    <div style="display:flex; align-items:center; gap:6px; margin-top:2px; margin-bottom:4px;">
      <input type="checkbox" id="chkBPMAuto" checked onchange="onBPMAuto(this.checked)">
      <label for="chkBPMAuto" style="font-size:12px; color:#555577; cursor:pointer;">Auto BPM</label>
    </div>
    <div style="display:flex; align-items:center; gap:6px; margin-top:6px; margin-bottom:4px;">
      <input type="checkbox" id="chkCycleMode" onchange="onCycleMode(this.checked)">
      <label for="chkCycleMode" style="font-size:12px; color:#555577; cursor:pointer;">Cycle Mode</label>
      <span id="valCycleState" style="font-size:11px; color:#00ffcc; margin-left:4px;"></span>
    </div>
  </div>

  <!-- Conductor -->
  <div class="panel">
    <h2>Conductor</h2>
    <label style="font-size:12px; color:#555577; margin-bottom:6px; display:block;">Force Phase</label>
    <div class="phase-pills" id="phasePills">
      <span class="phase-pill active" data-phase="auto" onclick="onPhase('auto')">Auto</span>
      <span class="phase-pill" data-phase="pulse" onclick="onPhase('pulse')">Pulse</span>
      <span class="phase-pill" data-phase="swell" onclick="onPhase('swell')">Swell</span>
      <span class="phase-pill" data-phase="surge" onclick="onPhase('surge')">Surge</span>
      <span class="phase-pill" data-phase="storm" onclick="onPhase('storm')">Storm</span>
      <span class="phase-pill" data-phase="maelstrom" onclick="onPhase('maelstrom')">Maelstrom</span>
      <span class="phase-pill" data-phase="cycle" style="display:none;">Cycle</span>
    </div>
    <div class="btn-row">
      <button class="btn danger" onclick="Conductor.simulateHit()">Sim Hit</button>
      <button class="btn" onclick="Conductor.simulateGraze('perfect')">Sim Graze</button>
    </div>
  </div>
</div>

<script>
// ── config.js ──────────────────────────────────────────
// ========== HARMONY ENGINE CONFIG ==========
// Audio-relevant constants extracted from DemoShooter/src/01_config.js
// This file contains ONLY the constants needed by the audio engine.

const CFG = {
  BPM: 120,
  get BEAT_MS() { return 60000 / this.BPM; },

  MAX_ENERGY: 3,

  MOODS: [
    { name: 'Chill',    bpm: 90  },
    { name: 'Normal',   bpm: 120 },
    { name: 'Intense',  bpm: 150 },
  ],

  // ── Difficulty Coefficient (SPEC_011) ─────────────────────────────────────
  DIFFICULTY: {
    CURVES: {
      chill:   { scale: 250, exp: 1.2 },
      normal:  { scale: 200, exp: 1.3 },
      intense: { scale: 160, exp: 1.4 },
    },
  },

  // ── Phases (SPEC_011) ────────────────────────────────────────────────────
  PHASES: [
    { name: 'pulse',     dc: 0,    types: ['dart'] },
    { name: 'swell',     dc: 0.30, types: ['dart', 'wave', 'bloom'] },
    { name: 'surge',     dc: 0.60, types: ['dart', 'wave', 'bloom', 'snap', 'drift'] },
    { name: 'storm',     dc: 1.00, types: null },
    { name: 'maelstrom', dc: 1.50, types: null },
  ],

  // Phase floor: tracks always audible per phase (SPEC_011 §3.1)
  PHASE_FLOOR: {
    pulse:     { kick: true, hat: false, snare: false, bass: false, pad: false, perc: false, melody: false },
    swell:     { kick: true, hat: true,  snare: false, bass: false, pad: false, perc: false, melody: true  },
    surge:     { kick: true, hat: true,  snare: true,  bass: true,  pad: false, perc: true,  melody: true  },
    storm:     { kick: true, hat: true,  snare: true,  bass: true,  pad: true,  perc: true,  melody: true  },
    maelstrom: { kick: true, hat: true,  snare: true,  bass: true,  pad: true,  perc: true,  melody: true  },
  },

  // Intensity thresholds (above floor) for adding layers
  INTENSITY_LAYER_THRESHOLDS: { hat: 5, snare: 10, bass: 10, pad: 20, perc: 15 },

  // Post-Maelstrom cosmetic phase names
  POST_MAELSTROM: [
    'Excuse Me', 'Unreasonable', 'Personal', 'This Is Rude',
    'Mathematically Unfair', 'Therapy Recommended', 'Send Help',
    'Why Are You Still Here', 'Fine. Stay.',
  ],

  // Phase FX: additive to palette baseline
  PHASE_FX: {
    pulse:     { reverbAdd: 0,    delayFbAdd: 0,    distAdd: 0,   sidechainAdd: 0,    padVoices: 3, detuneAdd: 0 },
    swell:     { reverbAdd: 0.10, delayFbAdd: 0.05, distAdd: 0,   sidechainAdd: 0,    padVoices: 3, detuneAdd: 0 },
    surge:     { reverbAdd: 0.12, delayFbAdd: 0.08, distAdd: 0,   sidechainAdd: 0.10, padVoices: 4, detuneAdd: 0 },
    storm:     { reverbAdd: 0.15, delayFbAdd: 0.10, distAdd: 0.1, sidechainAdd: 0.15, padVoices: 4, detuneAdd: 0 },
    maelstrom: { reverbAdd: 0.20, delayFbAdd: 0.15, distAdd: 0.2, sidechainAdd: 0.25, padVoices: 4, detuneAdd: 12 },
  },

  // ── Graze config (audio needs these for SFX) ─────────────────────────────
  GRAZE: {
    ZONE_NORMAL:  2.5,
    ZONE_TIGHT:   1.6,
    ZONE_PERFECT: 1.15,
    BASE_SCORE:   10,
    TIER_MULTIPLIER: { normal: 1, tight: 2, perfect: 5 },
    STREAK_WINDOW:     2,
    STREAK_MULTIPLIER: 0.3,
    STREAK_CAP:        10,
    PULSE_THRESHOLD:   5,
    PULSE_RADIUS:      120,
    PULSE_FORCE:       4,
    PULSE_FRAMES:      8,
    PULSE_COOLDOWN:    4,
    PULSE_ZONE_SHRINK: 0.90,
    COOLDOWN_MS: 150,
  },

  GAIN: {
    // Drums
    kick:        0.38,
    snare_noise: 0.24,
    snare_tonal: 0.10,
    hat:         0.12,
    perc:        0.13,
    // Bass
    bass:        0.20,
    // Melody
    melody:      0.06,
    // Pad
    pad:         0.013,
    // Beat tick layers
    tick_sq:     0.05,
    tick_sub:    0.04,
    tick_stab:   0.025,
    // SFX
    hit_hp3:     0.14,
    hit_hp3b:    0.11,
    hit_hp2:     0.13,
    hit_hp2b:    0.11,
    hit_hp2c:    0.09,
    hit_hp1:     0.16,
    hit_hp1b:    0.14,
    hit_hp1c:    0.13,
    hit_hp1d:    0.11,
    combo_hi:    0.06,
    combo_mid:   0.08,
    combo_lo:    0.06,
    near_miss:   0.05,
    graze_normal:  0.06,
    graze_tight:   0.09,
    graze_perfect: 0.12,
    slash_layer:   0.08,
    streak_tone:   0.05,
    pulse_boom:    0.14,
    regen:         0.08,
    voice:       0.03,
    perk:        0.12,
    stinger:     0.10,
    bass_fill:   0.12,
    death_swell: 0.08,
    death_note:  0.10,
  },

  // ── Staggered phase transitions (SPEC_010) ────────────────────────────────
  STAGGER_OVERRIDE: null,   // null = use palette defaults. Set to { rhythm, harmony, texture, melody, window } to override.
  STAGGER_DEFAULT: { rhythm: 0, harmony: 2, texture: 4, melody: 4, window: 4 },

  // ── Tension curve randomization (SPEC_011) ────────────────────────────────
  TENSION: {
    WINDOW_MIN: 32,          // minimum beats per candidate window
    WINDOW_MAX: 64,          // maximum beats per candidate window
    GRACE_BEATS: 16,         // no events before this beat
    GAP_MIN: 8,              // minimum beats between events
    BASE_PROBS: {            // base probabilities (before palette bias)
      none: 0.40,
      plateau: 0.25,
      spike: 0.15,
      retreat: 0.20,
    },
    DURATION: {
      plateau: { min: 16, max: 32, easeIn: 0,  easeOut: 4 },
      spike:   { min: 8,  max: 16, easeIn: 4,  easeOut: 4 },
      retreat: { min: 12, max: 24, easeIn: 4,  easeOut: 8 },
    },
  },

  // ── Cycle mode timing (SPEC_008 §2/§3/§5) ────────────────────────────────
  CYCLE: {
    DECAY_BARS:           16,   // bars to strip instruments down
    BRIDGE_BARS:           4,   // kick-only bars between palettes
    REBUILD_BARS:         16,   // bars to layer new palette instruments in
    MAELSTROM_SUSTAIN_MIN: 8,   // min bars before cycle triggers
    MAELSTROM_SUSTAIN_MAX: 32,  // max bars before cycle triggers
  },

  // ── Audio Visualizer (for UI) ─────────────────────────────────────────────
  VIZ: {
    CENTER_X:    300,
    CENTER_Y:    300,
    BINS:         64,
    BAR_W:         3,
    COLOR:    0x7b2fff,
    RENDER_EVERY:  3,
    BEAT_SPIKE:  0.20,
    PHASE_FLASH_A: 0.30,
    PHASE_FLASH_MS: 120,
    BREATH_PX:     3,
    BREATH_BEATS:  2,
    INNER_ALPHA: 0.15,
    PHASE_CFG: {
      Pulse:     [60, 50, 0.25],
      Swell:     [55, 60, 0.28],
      Surge:     [50, 65, 0.32],
      Storm:     [45, 70, 0.36],
      Maelstrom: [40, 80, 0.40],
    },
  },
};


// ── state.js ──────────────────────────────────────────
// ========== HARMONY ENGINE STATE ==========
// Standalone state for the music station.
// Replaces DemoShooter's game state (02_state.js) with a virtual conductor.

// ========== SEEDED PRNG (SPEC_020 §7) ==========
var _songRng = null;

function _createSongRng(seed) {
  var state = seed | 0;
  return function() {
    state = (state + 0x6D2B79F5) | 0;
    var t = Math.imul(state ^ (state >>> 15), 1 | state);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ========== TENSION MAP (SPEC_011) ==========
// Generates per-song tension events (plateaus, spikes, retreats) on top of
// the monotonic DC power curve. Same seed → same map → reproducible.

var TensionMap = (function() {
  var _events = [];
  var _suppressed = false;  // true when autoPhase off or cycle active

  // Find the active event for a given beat count
  function _findActive(beat) {
    for (var i = 0; i < _events.length; i++) {
      var e = _events[i];
      if (beat >= e.startBeat && beat < e.startBeat + e.duration) return e;
    }
    return null;
  }

  // Compute eased offset for spike/retreat
  function _easedOffset(e, beat) {
    var into = beat - e.startBeat;
    var t;
    if (e.easeIn > 0 && into < e.easeIn) {
      t = into / e.easeIn;
      return e.magnitude * t;
    } else if (e.easeOut > 0 && into > e.duration - e.easeOut) {
      var remaining = e.duration - into;
      t = remaining / e.easeOut;
      return e.magnitude * t;
    }
    return e.magnitude;
  }

  return {
    // Generate tension events from PRNG + palette profile
    generate: function(rng, palette) {
      _events = [];
      _suppressed = false;
      if (!rng || !palette) return;

      var T = CFG.TENSION;
      var prof = palette.tension || {};
      var density = prof.eventDensity != null ? prof.eventDensity : 0.7;
      var retreatDepth = prof.retreatDepth != null ? prof.retreatDepth : 0.15;
      var spikeHeight = prof.spikeHeight != null ? prof.spikeHeight : 0.20;
      var plateauBias = prof.plateauBias != null ? prof.plateauBias : 0.0;

      // Compute adjusted probabilities
      var pNone = T.BASE_PROBS.none;
      var pPlateau = T.BASE_PROBS.plateau + plateauBias;
      var pSpike = T.BASE_PROBS.spike;
      var pRetreat = T.BASE_PROBS.retreat;
      // Normalize
      var sum = pNone + pPlateau + pSpike + pRetreat;
      pNone /= sum; pPlateau /= sum; pSpike /= sum; pRetreat /= sum;

      // Phase thresholds for spike capping
      var phases = CFG.PHASES;

      // Walk candidate windows
      var beat = T.GRACE_BEATS;
      var maxBeat = 800; // ~6+ minutes at 120bpm — enough for any song
      var lastEventEnd = 0;

      while (beat < maxBeat) {
        var windowSize = T.WINDOW_MIN + Math.floor(rng() * (T.WINDOW_MAX - T.WINDOW_MIN + 1));
        var midBeat = beat + Math.floor(windowSize / 2);

        // Density roll — skip window?
        if (rng() > density) { beat += windowSize; continue; }

        // Enforce gap from last event
        if (midBeat < lastEventEnd + T.GAP_MIN) { beat += windowSize; continue; }

        // Event type roll
        var roll = rng();
        var type;
        if (roll < pNone) { beat += windowSize; continue; }
        else if (roll < pNone + pPlateau) type = 'plateau';
        else if (roll < pNone + pPlateau + pSpike) type = 'spike';
        else type = 'retreat';

        // Duration
        var dur = T.DURATION[type];
        var duration = dur.min + Math.floor(rng() * (dur.max - dur.min + 1));

        // Magnitude
        var magnitude = 0;
        if (type === 'spike') {
          // Magnitude = fraction of gap to next phase threshold
          // Use spikeHeight as fraction of 0.30 (typical phase gap)
          magnitude = spikeHeight * 0.30;
        } else if (type === 'retreat') {
          // Magnitude is negative — fraction of expected DC at this point
          // Estimate DC at midBeat using normal curve
          var moodKey = (CFG.MOODS[1] || {}).name;
          var curve = CFG.DIFFICULTY.CURVES[(moodKey || 'normal').toLowerCase()] || CFG.DIFFICULTY.CURVES.normal;
          var estDC = Math.pow(midBeat / curve.scale, curve.exp);
          magnitude = -(retreatDepth * Math.max(estDC, 0.1));
        }
        // plateau magnitude stays 0 (freeze, not additive)

        _events.push({
          type: type,
          startBeat: midBeat,
          duration: duration,
          magnitude: magnitude,
          easeIn: dur.easeIn,
          easeOut: dur.easeOut,
          frozenDC: 0, // set at runtime for plateaus
        });

        lastEventEnd = midBeat + duration;
        beat += windowSize;
      }

      if (_events.length > 0) {
        console.log('[TensionMap] Generated ' + _events.length + ' events for ' + palette.name);
      }
    },

    // Get the effective DC offset for a given beat.
    // Returns { offset, freeze } — if freeze is true, caller uses frozenDC instead of baseDC+offset
    getOffset: function(beatCount) {
      if (_suppressed) return { offset: 0, freeze: false };
      var e = _findActive(beatCount);
      if (!e) return { offset: 0, freeze: false };

      if (e.type === 'plateau') {
        // During easeOut, lerp back to normal
        var into = beatCount - e.startBeat;
        if (e.easeOut > 0 && into > e.duration - e.easeOut) {
          var remaining = e.duration - into;
          var t = remaining / e.easeOut;
          return { offset: 0, freeze: true, freezeLerp: t, frozenDC: e.frozenDC };
        }
        return { offset: 0, freeze: true, freezeLerp: 1.0, frozenDC: e.frozenDC };
      }

      return { offset: _easedOffset(e, beatCount), freeze: false };
    },

    // Set frozenDC for a plateau event at the given beat (called from updateDC on first beat of plateau)
    _stampFrozenDC: function(beatCount, dc) {
      var e = _findActive(beatCount);
      if (e && e.type === 'plateau' && e.frozenDC === 0) {
        e.frozenDC = dc;
      }
    },

    // Cap spike so it doesn't skip >1 phase
    _capSpike: function(baseDC, offset) {
      if (offset <= 0) return offset;
      var effective = baseDC + offset;
      var phases = CFG.PHASES;
      // Find current phase index
      var curIdx = 0;
      for (var i = phases.length - 1; i >= 0; i--) {
        if (baseDC >= phases[i].dc) { curIdx = i; break; }
      }
      // Max allowed = threshold of curIdx+2 (skip 1 = land on curIdx+1, so cap at curIdx+2 boundary - 0.01)
      var maxIdx = Math.min(curIdx + 2, phases.length - 1);
      var cap = phases[maxIdx].dc - 0.01;
      if (effective > cap && maxIdx < phases.length - 1) {
        return cap - baseDC;
      }
      return offset;
    },

    setSuppressed: function(v) { _suppressed = !!v; },
    isActive: function(beat) {
      if (_suppressed) return false;
      return !!_findActive(beat != null ? beat : G.beatCount - G.beatCountCycleBase);
    },
    currentEvent: function(beat) {
      if (_suppressed) return null;
      return _findActive(beat != null ? beat : G.beatCount - G.beatCountCycleBase);
    },
    reset: function() { _events = []; _suppressed = false; },
  };
})();

// ========== VIRTUAL GAME STATE ==========
// The audio engine reads these fields. The virtual conductor writes them.

const G = {
  score: 0,
  intensity: 0,
  bestIntensity: 0,
  energy: CFG.MAX_ENERGY,
  beatCount: 0,
  alive: true,
  lastBeatTime: 0,
  bpm: CFG.BPM,

  // Settings
  settings: { volume: 0.8, mood: 1, palette: 0, bpmOverride: null, cycleMode: false },  // palette: 0=random, 1..N=locked; bpmOverride: null=auto, number=locked BPM; cycleMode: auto-rotate palettes

  // Per-run tracking
  songHash: '',
  songSeed: 0,

  // Difficulty Coefficient
  dc: 0,
  phase: 'pulse',
  phaseEntryBeat: 0,
  beatCountCycleBase: 0,   // subtracted from beatCount for cycle-relative DC + TensionMap lookups
  _phaseChangeListeners: [],

  // Perk state
  perks: [],

  // Playback state
  paused: false,
  beatsSinceHit: 0,

  // Graze state (audio references)
  grazeStreak: 0,
  grazeStreakBeat: 0,
  pulseArmed: false,
  pulseCooldown: 0,
  grazesRun: 0,

  // Meta
  meta: {
    beatsLifetime: 0,
  },
};

// ── Difficulty engine (virtual conductor drives this) ─────────────────────

function updateDC(beatTime) {
  var moodKey = (CFG.MOODS[G.settings.mood] || CFG.MOODS[1]).name.toLowerCase();
  var curve = CFG.DIFFICULTY.CURVES[moodKey] || CFG.DIFFICULTY.CURVES.normal;
  // Use cycle-relative beat so each cycle's DC arc starts from 0
  var cycleBeat = G.beatCount - G.beatCountCycleBase;
  var baseDC = Math.pow(cycleBeat / curve.scale, curve.exp);

  // ── Tension curve modulation (SPEC_011 §4) ──────────────────────────────
  var tension = TensionMap.getOffset(cycleBeat);
  if (tension.freeze) {
    // Plateau: stamp frozenDC on first beat, then hold
    TensionMap._stampFrozenDC(cycleBeat, baseDC);
    if (tension.freezeLerp < 1.0) {
      // easeOut: lerp from frozen back to current baseDC
      G.dc = tension.frozenDC + (baseDC - tension.frozenDC) * (1.0 - tension.freezeLerp);
    } else {
      G.dc = tension.frozenDC;
    }
  } else {
    var offset = TensionMap._capSpike(baseDC, tension.offset);
    G.dc = Math.max(0, baseDC + offset);
  }

  // Log tension event transitions (use cycle-relative beat for event lookup)
  var curEvent = TensionMap.currentEvent(cycleBeat);
  if (curEvent) {
    var into = cycleBeat - curEvent.startBeat;
    if (into === 0) {
      console.log('[TensionMap] ' + curEvent.type + ' started at cycle-beat ' + cycleBeat +
                  ' (duration=' + curEvent.duration + ')');
    } else if (into === curEvent.duration - 1) {
      console.log('[TensionMap] ' + curEvent.type + ' ending at cycle-beat ' + cycleBeat);
    }
  }

  var phases = CFG.PHASES;
  var newPhase = phases[0].name;
  for (var i = phases.length - 1; i >= 0; i--) {
    if (G.dc >= phases[i].dc) { newPhase = phases[i].name; break; }
  }

  if (newPhase !== G.phase) {
    var oldPhase = G.phase;
    G.phase = newPhase;
    G.phaseEntryBeat = G.beatCount;
    for (var j = 0; j < G._phaseChangeListeners.length; j++) {
      G._phaseChangeListeners[j](newPhase, oldPhase, beatTime);
    }
  }
}

function onPhaseChange(fn) {
  G._phaseChangeListeners.push(fn);
}

function getPostMaelstromName() {
  if (G.phase !== 'maelstrom') return null;
  var beatsSinceEntry = G.beatCount - G.phaseEntryBeat;
  if (beatsSinceEntry < 64) return null;
  var idx = Math.floor(beatsSinceEntry / 64) - 1;
  var names = CFG.POST_MAELSTROM;
  return names[Math.min(idx, names.length - 1)];
}

// ── Run initialization (replaces resetRun) ────────────────────────────────

function resetRun(seedOverride) {
  G.score = 0;
  G.intensity = 0;
  G.bestIntensity = 0;
  G.energy = CFG.MAX_ENERGY;
  G.beatCount = 0;
  G.alive = true;
  G.lastBeatTime = 0;
  G.dc = 0;
  G.phase = 'pulse';
  G.phaseEntryBeat = 0;
  G.beatCountCycleBase = 0;
  G._phaseChangeListeners = [];
  G.perks = [];
  G.beatsSinceHit = 0;
  G.grazeStreak = 0;
  G.grazeStreakBeat = 0;
  G.pulseArmed = false;
  G.pulseCooldown = 0;
  G.grazesRun = 0;

  // Palette selection + seeded PRNG
  if (typeof _selectPalette === 'function' && typeof HarmonyEngine !== 'undefined') {
    var pal = _selectPalette();
    var paletteIdx = (typeof PALETTES !== 'undefined') ? PALETTES.indexOf(pal) : 0;
    // Seed override: use provided seed (URL param replay), else generate fresh
    if (seedOverride != null && isFinite(seedOverride)) {
      G.songSeed = seedOverride | 0;
    } else {
      G.songSeed = paletteIdx * 10000 + Math.floor(Math.random() * 10000);
    }
    _songRng = _createSongRng(G.songSeed);

    HarmonyEngine.initRun(pal);
    if (typeof PaletteBlender !== 'undefined') PaletteBlender.initRun(pal);
    // Generate tension map for this song (SPEC_011 §3.1)
    TensionMap.generate(_songRng, pal);
    // Auto BPM: always pick from palette's natural range
    G.bpm = pal.bpmRange[0] + Math.floor(_songRng() * (pal.bpmRange[1] - pal.bpmRange[0] + 1));
    // BPM override: user-set value takes priority
    if (G.settings.bpmOverride !== null) G.bpm = G.settings.bpmOverride;
    if (typeof Sequencer !== 'undefined') Sequencer.initRun(pal);
    if (typeof VoicePool !== 'undefined') VoicePool.initRun(pal);
    if (typeof NarrativeConductor !== 'undefined') NarrativeConductor.initRun(pal);
    if (typeof StateMapper !== 'undefined') StateMapper.initRun();
  } else {
    G.songSeed = Math.floor(Math.random() * 100000);
    _songRng = _createSongRng(G.songSeed);
    var moodBpm = CFG.MOODS[G.settings.mood] ? CFG.MOODS[G.settings.mood].bpm : null;
    G.bpm = moodBpm !== null ? moodBpm : CFG.BPM;
    if (G.settings.bpmOverride !== null) G.bpm = G.settings.bpmOverride;
  }
  if (typeof applyVolumeSetting === 'function') applyVolumeSetting();
}

// ── Song hash utility ─────────────────────────────────────────────────────

function computeSongHash(paletteIdx, bpm, beats, intensity, seed) {
  var n = seed
    ? ((seed * 7919 + paletteIdx * 6271 + beats * 1021 + intensity * 3) & 0xFFFF)
    : ((paletteIdx * 7919 + bpm * 6271 + beats * 1021 + intensity * 3) & 0xFFFF);
  return n.toString(16).toUpperCase().padStart(4, '0');
}


// ── audio.js ──────────────────────────────────────────
// ========== PROCEDURAL AUDIO — RHYTHM ENGINE ==========

var audioCtx = null;
var masterGain = null;
var _limiter = null;
var submixGain = null;   // music bus — Sequencer, PadTrack, GrazeStreakTrack
var sfxGain = null;      // SFX bus — voice pool, perk effects, one-shots (muted during pause/perk)
var waveshaper = null;
var _compressor = null;
var _delay = null;
var _delayFeedback = null;
var _reverbDry = null;
var _reverbWet = null;
var _reverb = null;
var _beatCallback = null;
var _beatScheduler = null;
var _nextBeatTime = 0;
// audioLevel removed — legacy intensity-tier system replaced by ArpTrack/Sequencer

var _LOOKAHEAD_S = 0.1;   // 100ms lookahead window
var _SCHEDULER_MS = 25;   // scheduler tick interval

// ── Per-track mix nodes (SPEC_016 §4) ──────────────────────────────────────
var _trackGains = {};     // { kick, bass, snare, hat, pad, arp, perc, sfx } → GainNode
var _trackEQs   = {};     // { kick, bass, snare, hat, pad, arp, perc, sfx } → array of BiquadFilterNode
var _mixBus     = null;   // all tracks merge here → sidechain → master chain
var _reverbSend = null;   // GainNode bus → shared reverb
var _delaySend  = null;   // GainNode bus → shared delay
var _softClip   = null;   // WaveShaperNode with tanh curve (replaces waveshaper)
var _masterEQ   = {};     // { low, mid, high } → BiquadFilterNode (3-band post-comp)
var _transientBuffers = {};  // { kick_click, snare_rattle, hat_body, clap, rim } → AudioBuffer
var _analyser = null;        // AnalyserNode on _mixBus for FFT visualizer (SPEC_028 §3)

// Per-track sidechain gains (SPEC_016 §5)
var _trackSidechains = {};  // { bass, pad, arp, perc, sfx } → GainNode (kick doesn't duck itself)

// Per-track send amounts (overridden per palette)
var _trackReverbSends = {}; // { pad, snare, arp } → GainNode (send to reverb bus)
var _trackDelaySends  = {}; // { arp, sfx } → GainNode (send to delay bus)

// --- Distortion curve for level 4 (legacy — kept for _applyPhaseEffects dist ramp) ---
function _makeDistortionCurve(amount) {
  const samples = 256;
  const curve = new Float32Array(samples);
  for (let i = 0; i < samples; i++) {
    const x = (i * 2) / samples - 1;
    curve[i] = ((Math.PI + amount) * x) / (Math.PI + amount * Math.abs(x));
  }
  return curve;
}

// --- Soft clipper: smooth tanh saturation (SPEC_016 §4) ---
function _makeSoftClipCurve() {
  var samples = 256;
  var curve = new Float32Array(samples);
  for (var i = 0; i < samples; i++) {
    var x = (i * 2) / samples - 1;
    curve[i] = Math.tanh(x * 1.5); // gentle saturation, warm at all levels
  }
  return curve;
}

// --- EQ helper: create a filter chain for a track (SPEC_016 §4) ---
function _makeTrackEQ(specs) {
  // specs: array of { type, freq, gain?, Q? }
  var filters = [];
  for (var i = 0; i < specs.length; i++) {
    var f = audioCtx.createBiquadFilter();
    f.type = specs[i].type;
    f.frequency.value = specs[i].freq;
    if (specs[i].gain !== undefined) f.gain.value = specs[i].gain;
    if (specs[i].Q !== undefined) f.Q.value = specs[i].Q;
    filters.push(f);
  }
  // Chain filters together
  for (var j = 0; j < filters.length - 1; j++) {
    filters[j].connect(filters[j + 1]);
  }
  return filters;
}

// --- Pre-render transient buffer via OfflineAudioContext (SPEC_016 §6) ---
function _prerenderTransient(spec) {
  var dur = spec.duration;
  var sampleRate = audioCtx.sampleRate;
  var offCtx = new OfflineAudioContext(1, Math.ceil(sampleRate * dur), sampleRate);

  // White noise source
  var bufLen = Math.ceil(sampleRate * dur);
  var nBuf = offCtx.createBuffer(1, bufLen, sampleRate);
  var data = nBuf.getChannelData(0);
  for (var i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
  var src = offCtx.createBufferSource();
  src.buffer = nBuf;

  // Bandpass filter to shape spectrum
  var bp = offCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = (spec.freqLo + spec.freqHi) / 2;
  bp.Q.value = spec.Q || 1.0;

  // Envelope
  var env = offCtx.createGain();
  env.gain.setValueAtTime(spec.peakGain || 1.0, 0);
  env.gain.exponentialRampToValueAtTime(0.001, dur);

  src.connect(bp);
  bp.connect(env);
  env.connect(offCtx.destination);
  src.start(0);

  return offCtx.startRendering();
}

// --- Synthetic reverb impulse response ---
function _makeImpulse(duration, decay) {
  const rate = audioCtx.sampleRate;
  const length = Math.floor(rate * duration);
  const impulse = audioCtx.createBuffer(2, length, rate);
  for (let ch = 0; ch < 2; ch++) {
    const data = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
    }
  }
  return impulse;
}

function initAudio() {
  if (audioCtx) {
    // Already exists — resume if suspended (autoplay policy or after stop)
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return;
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // --- Final output stage ---
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 1.0;

  // ── Legacy aliases (backward compat — submixGain/sfxGain still referenced) ──
  submixGain = audioCtx.createGain();
  submixGain.gain.value = 1.0;
  sfxGain = audioCtx.createGain();
  sfxGain.gain.value = 1.0;

  // ── Legacy waveshaper (kept for _applyPhaseEffects dist ramp) ──
  waveshaper = audioCtx.createWaveShaper();
  waveshaper.curve = _makeDistortionCurve(0);
  waveshaper.oversample = '2x';

  // ══════════════════════════════════════════════════════════════════
  // SPEC_016 §4 — Per-track mix chain
  // ══════════════════════════════════════════════════════════════════

  // --- Mix bus: all tracks merge here ---
  _mixBus = audioCtx.createGain();
  _mixBus.gain.value = 1.0;

  // --- Per-track gain nodes ---
  var trackNames = ['kick', 'bass', 'snare', 'hat', 'pad', 'perc', 'sfx', 'melody', 'perk'];
  for (var i = 0; i < trackNames.length; i++) {
    _trackGains[trackNames[i]] = audioCtx.createGain();
    _trackGains[trackNames[i]].gain.value = 1.0;
  }

  // --- Per-track EQ chains (SPEC_016 §4) ---
  _trackEQs.kick = _makeTrackEQ([
    { type: 'lowpass', freq: 200, Q: 0.7 }
  ]);
  _trackEQs.bass = _makeTrackEQ([
    { type: 'highpass', freq: 40, Q: 0.7 },
    { type: 'peaking', freq: 80, gain: 3, Q: 1.0 },
    { type: 'lowpass', freq: 400, Q: 0.7 }
  ]);
  _trackEQs.snare = _makeTrackEQ([
    { type: 'highpass', freq: 100, Q: 0.7 },
    { type: 'peaking', freq: 2000, gain: 2, Q: 1.0 },
    { type: 'lowpass', freq: 8000, Q: 0.7 }
  ]);
  _trackEQs.hat = _makeTrackEQ([
    { type: 'highpass', freq: 3000, Q: 0.7 }
  ]);
  _trackEQs.pad = _makeTrackEQ([
    { type: 'highpass', freq: 200, Q: 0.7 },
    { type: 'peaking', freq: 500, gain: -2, Q: 1.0 },
    { type: 'lowpass', freq: 3000, Q: 0.7 }
  ]);
  _trackEQs.perc = _makeTrackEQ([
    { type: 'highpass', freq: 400, Q: 0.7 },
    { type: 'lowpass', freq: 6000, Q: 0.7 }
  ]);
  _trackEQs.sfx = _makeTrackEQ([
    { type: 'highpass', freq: 100, Q: 0.7 },
    { type: 'peaking', freq: 500, gain: -2, Q: 1.0 },  // scoop mud range, clear of bass
    { type: 'lowpass', freq: 8000, Q: 0.7 }             // tighter LP — voices/graze don't need >8kHz
  ]);
  // Melody: warm mid-range, below voices (SPEC_017 §5/§9)
  _trackEQs.melody = _makeTrackEQ([
    { type: 'highpass', freq: 200, Q: 0.7 },
    { type: 'peaking', freq: 800, gain: 1, Q: 1.0 },   // +1dB warmth in melody range
    { type: 'peaking', freq: 2000, gain: -3, Q: 1.0 },  // -3dB above 2kHz to sit below voices
    { type: 'lowpass', freq: 4000, Q: 0.7 }
  ]);

  // Perk: mid-range (SPEC_025 §3.1)
  _trackEQs.perk = _makeTrackEQ([
    { type: 'highpass', freq: 150, Q: 0.7 },
    { type: 'peaking', freq: 600, gain: 1, Q: 1.0 },   // +1dB gentle presence
    { type: 'lowpass', freq: 5000, Q: 0.7 }
  ]);

  // --- Per-track sidechain gains (SPEC_016 §5) ---
  var scTracks = ['bass', 'pad', 'perc', 'sfx', 'melody', 'perk'];
  for (var si = 0; si < scTracks.length; si++) {
    _trackSidechains[scTracks[si]] = audioCtx.createGain();
    _trackSidechains[scTracks[si]].gain.value = 1.0;
  }

  // --- Wire per-track: gain → EQ → [sidechain] → mixBus ---
  for (var ti = 0; ti < trackNames.length; ti++) {
    var tn = trackNames[ti];
    var gain = _trackGains[tn];
    var eqChain = _trackEQs[tn];

    // gain → first EQ filter
    gain.connect(eqChain[0]);

    // last EQ filter → sidechain (if track has one) → mixBus
    var eqOut = eqChain[eqChain.length - 1];
    if (_trackSidechains[tn]) {
      eqOut.connect(_trackSidechains[tn]);
      _trackSidechains[tn].connect(_mixBus);
    } else {
      // kick, snare, hat go direct to mixBus (no sidechain on themselves)
      eqOut.connect(_mixBus);
    }

  // --- Send buses (SPEC_016 §4) ---
  // Reverb send bus → shared reverb
  _reverb = audioCtx.createConvolver();
  _reverb.buffer = _makeImpulse(0.8, 2.0);
  _reverbSend = audioCtx.createGain();
  _reverbSend.gain.value = 1.0;
  _reverbWet = audioCtx.createGain();
  _reverbWet.gain.value = 0.3;
  _reverbDry = audioCtx.createGain();
  _reverbDry.gain.value = 0.7;
  _reverbSend.connect(_reverb);
  _reverb.connect(_reverbWet);
  _reverbWet.connect(_mixBus);

  // Per-track reverb sends: pad (wet), snare (light)
  _trackReverbSends.pad = audioCtx.createGain();
  _trackReverbSends.pad.gain.value = 0.28;   // default, overridden per palette at run start
  _trackReverbSends.snare = audioCtx.createGain();
  _trackReverbSends.snare.gain.value = 0.15;
  // Melody reverb send (SPEC_017 §5)
  _trackReverbSends.melody = audioCtx.createGain();
  _trackReverbSends.melody.gain.value = 0.22;
  // Melody delay send
  _trackDelaySends.melody = audioCtx.createGain();
  _trackDelaySends.melody.gain.value = 0.15;
  // Perk reverb + delay sends (SPEC_025 §3.1 — subtle: close/present feel)
  _trackReverbSends.perk = audioCtx.createGain();
  _trackReverbSends.perk.gain.value = 0.15;
  _trackDelaySends.perk = audioCtx.createGain();
  _trackDelaySends.perk.gain.value = 0.10;

  // Wire: track EQ output → send gain → reverb bus
  _trackEQs.pad[_trackEQs.pad.length - 1].connect(_trackReverbSends.pad);
  _trackReverbSends.pad.connect(_reverbSend);
  _trackEQs.snare[_trackEQs.snare.length - 1].connect(_trackReverbSends.snare);
  _trackReverbSends.snare.connect(_reverbSend);
  _trackEQs.melody[_trackEQs.melody.length - 1].connect(_trackReverbSends.melody);
  _trackReverbSends.melody.connect(_reverbSend);
  _trackEQs.perk[_trackEQs.perk.length - 1].connect(_trackReverbSends.perk);
  _trackReverbSends.perk.connect(_reverbSend);

  // Delay send bus → shared delay
  _delay = audioCtx.createDelay(1.0);
  _delay.delayTime.value = (CFG.BEAT_MS / 2) / 1000;
  _delayFeedback = audioCtx.createGain();
  _delayFeedback.gain.value = 0.25;
  _delaySend = audioCtx.createGain();
  _delaySend.gain.value = 1.0;
  var _delayOut = audioCtx.createGain();
  _delayOut.gain.value = 0.5;
  _delaySend.connect(_delay);
  _delay.connect(_delayFeedback);
  _delayFeedback.connect(_delay);
  _delay.connect(_delayOut);
  _delayOut.connect(_mixBus);

  // Per-track delay sends: sfx/voices (16th note, low feedback)
  _trackDelaySends.sfx = audioCtx.createGain();
  _trackDelaySends.sfx.gain.value = 0.1;
  _trackEQs.sfx[_trackEQs.sfx.length - 1].connect(_trackDelaySends.sfx);
  _trackDelaySends.sfx.connect(_delaySend);
  // Melody delay send (wired after _delaySend is created)
  _trackEQs.melody[_trackEQs.melody.length - 1].connect(_trackDelaySends.melody);
  _trackDelaySends.melody.connect(_delaySend);
  // Perk delay send (SPEC_025 §3.1)
  _trackEQs.perk[_trackEQs.perk.length - 1].connect(_trackDelaySends.perk);
  _trackDelaySends.perk.connect(_delaySend);

  // ── Master chain: mixBus → compressor → softClip → masterEQ → limiter → dest ──

  // Compressor: glue + clip prevention
  _compressor = audioCtx.createDynamicsCompressor();
  _compressor.threshold.value = -14;   // relaxed: per-track EQ reduces inter-track masking
  _compressor.ratio.value = 2.5;       // gentler ratio — per-track sidechain handles dynamics
  _compressor.attack.value = 0.003;
  _compressor.release.value = 0.25;

  // Soft clipper (SPEC_016 §4 — replaces waveshaper in signal path)
  _softClip = audioCtx.createWaveShaper();
  _softClip.curve = _makeSoftClipCurve();
  _softClip.oversample = '2x';

  // Master EQ: 3-band post-compression (SPEC_016 §4)
  _masterEQ.low = audioCtx.createBiquadFilter();
  _masterEQ.low.type = 'lowshelf';
  _masterEQ.low.frequency.value = 80;
  _masterEQ.low.gain.value = 1;     // +1dB sub warmth
  _masterEQ.mid = audioCtx.createBiquadFilter();
  _masterEQ.mid.type = 'peaking';
  _masterEQ.mid.frequency.value = 500;
  _masterEQ.mid.gain.value = -1.5;  // -1.5dB reduce muddiness
  _masterEQ.mid.Q.value = 1.0;
  _masterEQ.high = audioCtx.createBiquadFilter();
  _masterEQ.high.type = 'highshelf';
  _masterEQ.high.frequency.value = 8000;
  _masterEQ.high.gain.value = 1;    // +1dB air/sparkle

  // Limiter: hard ceiling
  _limiter = audioCtx.createDynamicsCompressor();
  _limiter.threshold.value = -2;     // tighter ceiling — soft clip handles saturation below this
  _limiter.knee.value      = 0;
  _limiter.ratio.value     = 20;
  _limiter.attack.value    = 0.001;
  _limiter.release.value   = 0.1;

  // Wire master chain
  _mixBus.connect(_compressor);
  _compressor.connect(_softClip);
  _softClip.connect(_masterEQ.low);
  _masterEQ.low.connect(_masterEQ.mid);
  _masterEQ.mid.connect(_masterEQ.high);
  _masterEQ.high.connect(masterGain);
  masterGain.connect(_limiter);
  _limiter.connect(audioCtx.destination);

  // ── Legacy compat: submixGain → mixBus (for any code still using it) ──
  submixGain.connect(_mixBus);
  // sfxGain → sfx track gain (gets EQ + sidechain from per-track chain)
  sfxGain.connect(_trackGains.sfx);

  // ── Sidechain gain (legacy — still used by _pumpSidechain for global duck) ──
  if (typeof _initSidechain === 'function') _initSidechain();

  // ── AnalyserNode for FFT visualizer (SPEC_028 §3) ──
  _analyser = audioCtx.createAnalyser();
  _analyser.fftSize = 128;                  // → 64 frequency bins
  _analyser.smoothingTimeConstant = 0.82;
  _mixBus.connect(_analyser);               // tap raw mix signal before master chain

  // ── Pre-render transient buffers (SPEC_016 §6) ──
  _prerenderTransient({ duration: 0.005, freqLo: 2000, freqHi: 8000, Q: 0.8, peakGain: 0.8 })
    .then(function(buf) { _transientBuffers.kick_click = buf; });
  _prerenderTransient({ duration: 0.030, freqLo: 3000, freqHi: 6000, Q: 2.0, peakGain: 0.6 })
    .then(function(buf) { _transientBuffers.snare_rattle = buf; });
  _prerenderTransient({ duration: 0.010, freqLo: 6000, freqHi: 12000, Q: 1.5, peakGain: 0.5 })
    .then(function(buf) { _transientBuffers.hat_body = buf; });
  _prerenderTransient({ duration: 0.040, freqLo: 1000, freqHi: 4000, Q: 0.8, peakGain: 0.7 })
    .then(function(buf) { _transientBuffers.clap = buf; });
  _prerenderTransient({ duration: 0.015, freqLo: 800, freqHi: 3000, Q: 1.2, peakGain: 0.6 })
    .then(function(buf) { _transientBuffers.rim = buf; });
}

function applyVolumeSetting() {
  if (!masterGain || !audioCtx) return;
  var vol = (typeof G !== 'undefined') ? (G.settings.volume !== undefined ? G.settings.volume : 0.8) : 0.8;
  // Cancel any pending automation (e.g. death fade) before setting volume,
  // otherwise the scheduled ramp overwrites the assigned value.
  masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
  masterGain.gain.setValueAtTime(vol, audioCtx.currentTime);
}

// ── FFT analyser access for visualizer (SPEC_028 §3) ──────────────────────
function getAnalyser() { return _analyser; }

// ── SFX bus mute/unmute — master switch for all non-music audio ──────────
// Call muteSfx() on pause, perkPause, death. unmuteSfx() on resume/unpause.
function muteSfx() {
  if (!sfxGain || !audioCtx) return;
  sfxGain.gain.cancelScheduledValues(audioCtx.currentTime);
  sfxGain.gain.setValueAtTime(sfxGain.gain.value, audioCtx.currentTime);
  sfxGain.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + 0.03);
}

function unmuteSfx() {
  if (!sfxGain || !audioCtx) return;
  sfxGain.gain.cancelScheduledValues(audioCtx.currentTime);
  sfxGain.gain.setValueAtTime(sfxGain.gain.value, audioCtx.currentTime);
  sfxGain.gain.linearRampToValueAtTime(1.0, audioCtx.currentTime + 0.05);
}

function startBeatClock(callback) {
  stopBeatClock();
  initAudio();
  applyVolumeSetting();
  _beatCallback = callback;
  _nextBeatTime = audioCtx.currentTime + 0.05; // small start offset
  _beatScheduler = setInterval(() => {
    if (!_beatCallback) return;
    const lookAhead = audioCtx.currentTime + _LOOKAHEAD_S;
    while (_nextBeatTime < lookAhead) {
      _beatCallback(_nextBeatTime); // pass scheduled beat time to caller
      // Use G.bpm if available (palette-driven), else fall back to CFG
      const beatMs = (typeof G !== 'undefined' && G.bpm) ? (60000 / G.bpm) : CFG.BEAT_MS;
      _nextBeatTime += beatMs / 1000;
    }
  }, _SCHEDULER_MS);
}

function stopBeatClock() {
  if (_beatScheduler) clearInterval(_beatScheduler);
  _beatScheduler = null;
  _beatCallback = null;
  _nextBeatTime = 0;
}


function resetAudioLevel() {
  // Legacy waveshaper reset (still used by _applyPhaseEffects dist ramp)
  if (waveshaper) {
    waveshaper.curve = _makeDistortionCurve(0);
    waveshaper._currentDist = 0;
  }
  // masterGain owned by applyVolumeSetting — not reset here
}

// ── Play a pre-rendered transient buffer on a track (SPEC_016 §6) ──
function _playTransient(name, trackGain, time, gainMult) {
  if (!audioCtx || !_transientBuffers[name] || !trackGain) return;
  var src = audioCtx.createBufferSource();
  src.buffer = _transientBuffers[name];
  var g = audioCtx.createGain();
  g.gain.value = gainMult || 1.0;
  src.connect(g);
  g.connect(trackGain);
  src.start(time);
}

// ── Per-track sidechain pump (SPEC_016 §5) ──
// Each track ducks with its own amount/release. Called from _synthKick.
var _SIDECHAIN_PROFILES = {
  bass: { duck: 0.80, attack: 0.005, release: 0.120 },
  pad:  { duck: 0.40, attack: 0.010, release: 0.200 },
  perc: { duck: 0.30, attack: 0.005, release: 0.100 },
  sfx:    { duck: 0.20, attack: 0.010, release: 0.080 },
  melody: { duck: 0.35, attack: 0.010, release: 0.150 },
  perk:   { duck: 0.30, attack: 0.010, release: 0.180 },  // light duck, same as pad profile (SPEC_025 §3.1)
};

function _pumpTrackSidechains(t) {
  // Apply per-phase sidechain multiplier from StateMapper (SPEC_016 §5/§7)
  var phaseMult = (typeof StateMapper !== 'undefined' && StateMapper._sidechainPhaseMult)
    ? StateMapper._sidechainPhaseMult : 1.0;
  var tracks = ['bass', 'pad', 'perc', 'sfx', 'melody', 'perk'];
  for (var i = 0; i < tracks.length; i++) {
    var sc = _trackSidechains[tracks[i]];
    if (!sc) continue;
    var prof = _SIDECHAIN_PROFILES[tracks[i]];
    var scaledDuck = Math.min(prof.duck * phaseMult, 0.95);
    var duckVal = 1 - scaledDuck;
    sc.gain.cancelScheduledValues(t);
    sc.gain.setValueAtTime(1.0, t);
    sc.gain.linearRampToValueAtTime(duckVal, t + prof.attack);
    sc.gain.linearRampToValueAtTime(1.0, t + prof.attack + prof.release);
  }
}

// --- Helper: create a short oscillator routed through SFX bus ---
function _playNote(type, freq, gainPeak, duration, startTime) {
  if (!audioCtx || !sfxGain) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(sfxGain);
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(gainPeak, startTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

function playHitSFX() {
  if (!audioCtx) return;
  var t = audioCtx.currentTime;

  // --- Root pitch from HarmonyEngine (in key), fallback to A2 ---
  var rootMidi = 45; // A2 fallback
  if (typeof HarmonyEngine !== 'undefined' && HarmonyEngine._currentChord) {
    // Chord root in octave 3 — low register, clearly distinct from voice pool
    rootMidi = (3 + 1) * 12 + HarmonyEngine._currentChord.rootSemitone;
  }
  var rootFreq  = midiToFreq(rootMidi);
  var fifthFreq = midiToFreq(rootMidi - 7); // descending fifth (in key)

  // --- Energy varies character: 3=punch, 2=grind, 1=alarm ---
  var energy = (typeof G !== 'undefined') ? G.energy : 3;

  if (energy >= 3) {
    // Full energy: sharp sawtooth punch — root → fifth descent
    _playNote('sawtooth', rootFreq,  CFG.GAIN.hit_hp3,  0.08, t);
    _playNote('sawtooth', fifthFreq, CFG.GAIN.hit_hp3b, 0.12, t + 0.06);
  } else if (energy === 2) {
    // Mid-damage: harsher, square wave, faster descent + noise burst
    _playNote('square', rootFreq,        CFG.GAIN.hit_hp2,  0.06, t);
    _playNote('square', fifthFreq,       CFG.GAIN.hit_hp2b, 0.10, t + 0.04);
    _playNote('square', fifthFreq * 0.5, CFG.GAIN.hit_hp2c, 0.14, t + 0.10); // sub octave kick
  } else {
    // Low energy: stacked tritone — dissonant, urgent, unmissable
    var tritone = midiToFreq(rootMidi - 6); // flat fifth = danger tone
    _playNote('sawtooth', rootFreq,  CFG.GAIN.hit_hp1,  0.05, t);
    _playNote('sawtooth', tritone,   CFG.GAIN.hit_hp1b, 0.08, t + 0.03);
    _playNote('sawtooth', fifthFreq, CFG.GAIN.hit_hp1c, 0.12, t + 0.08);
    _playNote('sawtooth', tritone,   CFG.GAIN.hit_hp1d, 0.16, t + 0.16); // echo
  }
}

function playIntensitySFX(intensity) {
  if (!audioCtx) return;
  // Only fire on milestones
  if (intensity !== 5 && intensity !== 10 && intensity !== 20 && intensity !== 50) return;
  var t = audioCtx.currentTime;

  // Ascending arpeggio of current chord tones (in key)
  var tones;
  if (typeof HarmonyEngine !== 'undefined' && HarmonyEngine._currentChord) {
    tones = HarmonyEngine.getChordTones(5); // octave 5
    // For x50: add octave above for extra sparkle
    if (intensity >= 50) {
      var highTones = HarmonyEngine.getChordTones(6);
      if (highTones.length > 0) tones.push(highTones[0]);
    }
  } else {
    // Fallback: generic ascending
    tones = [440, 554, 659];
  }

  // Scale gain by milestone
  var gainScale = intensity >= 50 ? CFG.GAIN.combo_hi : intensity >= 20 ? CFG.GAIN.combo_mid : CFG.GAIN.combo_lo;
  var spacing   = intensity >= 50 ? 0.06 : 0.08;

  // Duck delay feedback briefly to prevent intensity SFX from recirculating
  if (_delayFeedback && intensity >= 20) {
    var savedFb = _delayFeedback.gain.value;
    _delayFeedback.gain.setValueAtTime(savedFb * 0.3, t);
    _delayFeedback.gain.linearRampToValueAtTime(savedFb, t + 0.4);
  }

  for (var i = 0; i < tones.length; i++) {
    var freq = (typeof tones[i] === 'number' && tones[i] > 100)
      ? tones[i]                          // already Hz (fallback)
      : midiToFreq(tones[i]);             // MIDI note
    // midiToFreq always used since getChordTones returns MIDI
    freq = midiToFreq(tones[i]);
    _playNote('sine', freq, gainScale - i * 0.01, 0.15, t + i * spacing);
  }
}

function playNearMissSFX() {
  // Legacy wrapper — routes to normal graze
  playGrazeSFX('normal');
}

// ── Tier-based graze SFX (SPEC_012) ──────────────────────────────────
// Each tier is percussive (attack <5ms, decay 60–120ms), uses chord tones.
function playGrazeSFX(tier) {
  if (!audioCtx) return;
  var t = audioCtx.currentTime;

  // Chord-tone frequency (5th of current chord, octave 6)
  var freq = 1200;
  if (typeof HarmonyEngine !== 'undefined' && HarmonyEngine._currentChord) {
    var root = HarmonyEngine._currentChord.rootSemitone;
    freq = midiToFreq((6 + 1) * 12 + root + 7);
  }

  if (tier === 'perfect') {
    // Full slash: noise burst + pitched resonance + short reverb tail
    var gain = CFG.GAIN.graze_perfect;
    // Pitched resonance (bandpass-filtered oscillator)
    _playNote('sine', freq, gain, 0.12, t);
    _playNote('triangle', freq * 1.5, gain * 0.5, 0.08, t);
    // Noise burst via short filtered click
    var bufLen = audioCtx.sampleRate * 0.015;
    var buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * 0.8;
    var noise = audioCtx.createBufferSource();
    noise.buffer = buf;
    var noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(gain * 0.7, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    var bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = 3;
    noise.connect(bp).connect(noiseGain).connect(sfxGain);
    noise.start(t); noise.stop(t + 0.06);
  } else if (tier === 'tight') {
    // Sharper transient + harmonic overtone
    var gain = CFG.GAIN.graze_tight;
    _playNote('triangle', freq, gain, 0.08, t);
    _playNote('square', freq * 2, gain * 0.3, 0.04, t);
  } else {
    // Normal: filtered click, in-key
    _playNote('sine', freq, CFG.GAIN.graze_normal, 0.06, t);
  }
}

// ── Slash SFX (SPEC_012 §2.1, §6) ────────────────────────────────────
// Metallic slice transient layered on top of graze SFX.
// Short, bright, percussive. Scales with tier.
function playSlashSFX(tier) {
  if (!audioCtx) return;
  var t = audioCtx.currentTime;
  var gain = CFG.GAIN.slash_layer;
  var isPerfect = tier === 'perfect';
  var isTight   = tier === 'tight';

  // High-pitched metallic ping (bandpass noise burst)
  var slashLen = isPerfect ? 0.04 : (isTight ? 0.03 : 0.02);
  var slashGain = isPerfect ? gain : (isTight ? gain * 0.75 : gain * 0.5);
  var bufLen2 = Math.floor(audioCtx.sampleRate * slashLen);
  var buf2 = audioCtx.createBuffer(1, bufLen2, audioCtx.sampleRate);
  var data2 = buf2.getChannelData(0);
  for (var i = 0; i < bufLen2; i++) data2[i] = (Math.random() * 2 - 1);
  var noiseSrc = audioCtx.createBufferSource();
  noiseSrc.buffer = buf2;
  // Bandpass centered at a high metallic frequency
  var slashBP = audioCtx.createBiquadFilter();
  slashBP.type = 'bandpass';
  slashBP.frequency.value = 3200 + (isPerfect ? 800 : 0);
  slashBP.Q.value = 6;
  var slashGainNode = audioCtx.createGain();
  slashGainNode.gain.setValueAtTime(slashGain, t);
  slashGainNode.gain.exponentialRampToValueAtTime(0.001, t + slashLen);
  // Route to perk track (SPEC_025 §8 — Edge family SFX through mix chain)
  var slashDest = (typeof _trackGains !== 'undefined' && _trackGains.perk) ? _trackGains.perk : sfxGain;
  noiseSrc.connect(slashBP).connect(slashGainNode).connect(slashDest);
  noiseSrc.start(t); noiseSrc.stop(t + slashLen);

  // Add a brief high sine ping for metal ring on tight/perfect
  if (isTight || isPerfect) {
    var pingFreq = isPerfect ? 2800 : 2200;
    // Inline to route to perk track
    var pingOsc = audioCtx.createOscillator();
    var pingGain = audioCtx.createGain();
    pingOsc.type = 'sine';
    pingOsc.frequency.value = pingFreq;
    pingGain.gain.setValueAtTime(slashGain * 0.4, t);
    pingGain.gain.exponentialRampToValueAtTime(0.0001, t + slashLen * 0.8);
    pingOsc.connect(pingGain).connect(slashDest);
    pingOsc.start(t); pingOsc.stop(t + slashLen * 0.8);
  }
}

// ── Beat Pulse SFX (SPEC_012 §2.3, §6) ─────────────────────────────────
// Bass-heavy boom: sub-bass thump (root note octave 2, 0.1s) + noise burst
// + sidechain pump on all other audio (100ms duck).
function playPulseSFX() {
  if (!audioCtx) return;
  var t = audioCtx.currentTime;
  var gain = CFG.GAIN.pulse_boom;

  // Sub-bass thump — root note of current chord, octave 2
  var rootFreq = 65; // fallback ~C2
  if (typeof HarmonyEngine !== 'undefined' && HarmonyEngine._currentChord) {
    rootFreq = midiToFreq(2 * 12 + HarmonyEngine._currentChord.rootSemitone);
  }
  // Pitch envelope: start slightly higher for punch
  var subOsc = audioCtx.createOscillator();
  subOsc.type = 'sine';
  subOsc.frequency.setValueAtTime(rootFreq * 1.5, t);
  subOsc.frequency.exponentialRampToValueAtTime(rootFreq, t + 0.03);
  var subGain = audioCtx.createGain();
  subGain.gain.setValueAtTime(gain, t);
  subGain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  // Sub-bass (65Hz root) routes to bass track — perk EQ has 150Hz HP which would gut it.
  // SPEC_025 §8: Beat Pulse is a musical event; sub-bass lives naturally in bass lane.
  var subDest = (typeof _trackGains !== 'undefined' && _trackGains.bass) ? _trackGains.bass : sfxGain;
  subOsc.connect(subGain).connect(subDest);
  subOsc.start(t); subOsc.stop(t + 0.12);

  // Noise transient burst (800Hz LP — mid-range content) routes to perk track
  var pulseDest = (typeof _trackGains !== 'undefined' && _trackGains.perk) ? _trackGains.perk : sfxGain;
  var bufLen = Math.floor(audioCtx.sampleRate * 0.03);
  var buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  var data = buf.getChannelData(0);
  for (var i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1);
  var noiseSrc = audioCtx.createBufferSource();
  noiseSrc.buffer = buf;
  var noiseBP = audioCtx.createBiquadFilter();
  noiseBP.type = 'lowpass';
  noiseBP.frequency.value = 800;
  var noiseGain = audioCtx.createGain();
  noiseGain.gain.setValueAtTime(gain * 0.6, t);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  noiseSrc.connect(noiseBP).connect(noiseGain).connect(pulseDest);
  noiseSrc.start(t); noiseSrc.stop(t + 0.05);

  // Sidechain pump: duck ALL other audio for 100ms via _pumpSidechain
  if (typeof _pumpSidechain === 'function') {
    _pumpSidechain(t, 0.85); // deep duck — 85% reduction
  }
}

// ── Energy Regen SFX (SPEC_013 §3) ──────────────────────────────────────────
// Ascending 3-note chime (root, +4st, +7st). Warm triangle wave, gentle attack.
function playRegenSFX() {
  if (!audioCtx) return;
  var t = audioCtx.currentTime;
  var gain = CFG.GAIN.regen || 0.08;

  // Root frequency from current palette
  var rootFreq = 261.63; // fallback C4
  if (typeof HarmonyEngine !== 'undefined' && HarmonyEngine._currentChord) {
    rootFreq = midiToFreq(4 * 12 + HarmonyEngine._currentChord.rootSemitone);
  }

  var intervals = [0, 4, 7]; // root, +4 semitones, +7 semitones
  intervals.forEach(function(semis, i) {
    var freq = rootFreq * Math.pow(2, semis / 12);
    var noteT = t + i * 0.15;
    var osc = audioCtx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, noteT);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0, noteT);
    g.gain.linearRampToValueAtTime(gain, noteT + 0.02);   // gentle attack
    g.gain.exponentialRampToValueAtTime(0.001, noteT + 0.15);
    osc.connect(g).connect(sfxGain);
    osc.start(noteT); osc.stop(noteT + 0.18);
  });
}

function _parseRoman(numeral) {
  // Handle borrowed chord prefixes: bVI, bVII, bII, #iv°
  var flat = false;
  var sharp = false;
  var stripped = numeral;
  if (stripped.charAt(0) === 'b') { flat = true; stripped = stripped.substring(1); }
  if (stripped.charAt(0) === '#') { sharp = true; stripped = stripped.substring(1); }

  // Handle diminished suffix
  var dim = false;
  if (stripped.charAt(stripped.length - 1) === '°') {
    dim = true;
    stripped = stripped.substring(0, stripped.length - 1);
  }

  var lower = stripped.toLowerCase();
  var degree = _ROMAN_MAP[lower];
  if (degree === undefined) degree = 0;

            oldTriads[i].third === newTriads[j].third &&
            oldTriads[i].fifth === newTriads[j].fifth) {

    for (var p = 0; p < pivots.length; p++) {

      candidates.push(target[i] - 12, target[i], target[i] + 12);
    }

    var result = [];
    var used = {};

    var prevSorted = prev.slice().sort(function(a, b) { return a - b; });

      var bestDist = Infinity;

          best = c;

      if (best !== null) {
        result.push(candidates[best]);
        used[best] = true;

    if (target.length > prev.length) {
      for (var t = prev.length; t < target.length; t++) {

    return this.getVoicedChordTones(octave);
  },

  // Proximity-based voice leading (SPEC_017 §6)
  _voiceToneIdx: 0,
  getNextChordTone: function(octave) {
    var tones = this.getChordTones(octave);
    if (!tones.length) return 60; // fallback C4

    if (this._lastVoiceNote === null) {
      // First voice: random chord tone
      var idx = Math.floor((_songRng || Math.random)() * tones.length);
      this._lastVoiceNote = tones[idx];
      return this._lastVoiceNote;
    }

    // Build candidates: chord tones in octave ± 1
    var candidates = [];
    for (var oct = octave - 1; oct <= octave + 1; oct++) {
      var t = this.getChordTones(oct);
      for (var i = 0; i < t.length; i++) candidates.push(t[i]);
    }

    // Sort by proximity to last note
    var last = this._lastVoiceNote;
    candidates.sort(function(a, b) {
      return Math.abs(a - last) - Math.abs(b - last);
    });

    // Pick from top 3 nearest (weighted random, not always closest)
    var pick = candidates[0];
    var _rngBt = (_songRng || Math.random);
    if (candidates.length >= 3 && _rngBt() < 0.3) {
      pick = candidates[Math.floor(_rngBt() * 3)];
    }

    this._lastVoiceNote = pick;
    return pick;
  },

  // Get available melody scale notes in a specific octave
  getScaleNotes: function(octave) {
    var root = this.root;
    var baseMidi = (octave + 1) * 12;
    return this._melodyScale.map(function(iv) { return baseMidi + root + iv; });
  },

  // Get current chord info (read-only snapshot)
  getCurrentChord: function() {
    return this._currentChord;
  },

  getPalette: function() {
    return this._palette;
  },
};

// --- Run-start palette selection (weighted recency) ---
function _selectPalette() {
  // 0 = random; 1..N = locked to PALETTES[idx-1]
  var setting = (typeof G !== 'undefined' && G.settings && G.settings.palette) || 0;
  if (setting > 0 && setting <= PALETTES.length) {
    return PALETTES[setting - 1];
  }

  // Load recent palette indices (last 5 runs)
  var recentPalettes = [];
  try {
    recentPalettes = JSON.parse(localStorage.getItem('recentPalettes') || '[]');
    if (!Array.isArray(recentPalettes)) recentPalettes = [];
  } catch (e) {
    recentPalettes = [];
  }

  // Weight each palette: recency penalty so same genre doesn't repeat
  var weights = PALETTES.map(function(p, i) {
    var pos = recentPalettes.indexOf(i);
    var recencyPenalty = 0;
    if (pos === 0)      recencyPenalty = 1.0;   // last played: impossible
    else if (pos === 1) recencyPenalty = 0.7;   // 2nd last: very unlikely
    else if (pos === 2) recencyPenalty = 0.4;   // 3rd last: unlikely
    else if (pos >= 3)  recencyPenalty = 0.1;   // older: slight penalty
    return Math.max(0.05, 1.0 - recencyPenalty);
  });

  // Weighted random selection
  var totalWeight = weights.reduce(function(a, b) { return a + b; }, 0);
  var rand = Math.random() * totalWeight;
  var idx = 0;
  for (var i = 0; i < weights.length; i++) {
    rand -= weights[i];
    if (rand <= 0) { idx = i; break; }
  }

  // Persist recency list
  try {
    recentPalettes.unshift(idx);
    recentPalettes = recentPalettes.slice(0, 5);
    localStorage.setItem('recentPalettes', JSON.stringify(recentPalettes));
  } catch (e) { /* localStorage unavailable — degrade silently */ }

  return PALETTES[idx];
}

// --- Palette Blending System (SPEC_019 §2) ---
// At Maelstrom entry, selects a second palette and lerps continuous params
// over 64 beats (capped at 40% blend). Discrete params (scale, patterns, BPM) never blend.
var PaletteBlender = {
  _active:        false,
  _source:        null,   // current palette
  _target:        null,   // blend target palette
  _blendAmount:   0,      // 0.0 → 0.4
  _beatsInMael:   0,      // beats since Maelstrom entry

  initRun: function(palette) {
    this._active      = false;
    this._source      = palette;
    this._target      = null;
    this._blendAmount = 0;
    this._beatsInMael = 0;
  },

  // Called by StateMapper._onPhaseChange when phase === 'maelstrom'
  onMaelstromEntry: function() {
    if (this._active || !this._source) return;
    // Pick a different palette as blend target
    var available = PALETTES.filter(function(p) {
      return p.name !== PaletteBlender._source.name;
    });
    if (!available.length) return;
    this._target = available[Math.floor((_songRng || Math.random)() * available.length)];
    this._beatsInMael = 0;
    this._blendAmount = 0;
    this._active = true;
    console.log('[PaletteBlender] Maelstrom blend start: ' +
                this._source.name + ' → ' + this._target.name);
  },

  // Called each beat by Sequencer.tick when in Maelstrom
  onBeat: function() {
    if (!this._active || !this._target) return;
    this._beatsInMael++;
    this._blendAmount = Math.min(this._beatsInMael / 64, 0.4);
    this._applyBlend();
  },

  // Lerp continuous parameters toward target
  _applyBlend: function() {
    if (!this._active || !this._target || !audioCtx) return;
    var a = this._blendAmount;
    var s = this._source;
    var t = this._target;

    function lerp(sv, tv) {
      if (typeof sv !== 'number' || typeof tv !== 'number') return sv;
      return sv + (tv - sv) * a;
    }

    // 1. Bass filter cutoff
    if (typeof _trackGains !== 'undefined' && _trackGains.bass &&
        s.bass && t.bass && typeof s.bass.filterCutoff === 'number' && typeof t.bass.filterCutoff === 'number') {
      var blendedCutoff = lerp(s.bass.filterCutoff, t.bass.filterCutoff);
      // Apply via StateMapper._updateBassFilter if exposed, else directly
      if (typeof StateMapper !== 'undefined' && StateMapper._bassFilter) {
        StateMapper._bassFilter.frequency.value = blendedCutoff;
      }
    }

    // 2. Pad detune + attack/release
    if (typeof PadTrack !== 'undefined' && PadTrack._palette &&
        s.pad && t.pad) {
      if (typeof s.pad.detune === 'number' && typeof t.pad.detune === 'number') {
        PadTrack._blendDetune = lerp(s.pad.detune, t.pad.detune);
      }
    }

    // 3. Reverb + delay sends
    if (s.effects && t.effects) {
      var sfx = s.effects.phases && s.effects.phases.pulse ? s.effects.phases.pulse : {};
      var tfx = t.effects.phases && t.effects.phases.pulse ? t.effects.phases.pulse : {};

      var blendReverb  = lerp(sfx.reverbSend || 0, tfx.reverbSend || 0);
      var blendDelay   = lerp(sfx.delaySend  || 0, tfx.delaySend  || 0);

      // Apply to per-track sends (pad is most audible)
      if (typeof _trackReverbSends !== 'undefined') {
        if (_trackReverbSends.pad)  _trackReverbSends.pad.gain.setTargetAtTime(blendReverb, audioCtx.currentTime, 0.5);
      }
      if (typeof _trackDelaySends !== 'undefined') {
        if (_trackDelaySends.sfx)   _trackDelaySends.sfx.gain.setTargetAtTime(blendDelay * 0.3, audioCtx.currentTime, 0.5);
      }
    }

    // 4. Swing (via GrooveEngine if available)
    if (typeof GrooveEngine !== 'undefined' &&
        typeof s.swing === 'number' && typeof t.swing === 'number') {
      GrooveEngine._blendSwing = lerp(s.swing, t.swing);
    }

    // 5. Drum velocities — lerp via Sequencer._drumPatterns live step velocities
    // Subtle: only affects kick/snare/hat relative gain, not timing
    if (typeof Sequencer !== 'undefined' && Sequencer._drumPatterns) {
      var sVol = (s.drums && s.drums.kick && typeof s.drums.kick.vel === 'number') ? s.drums.kick.vel : 0.7;
      var tVol = (t.drums && t.drums.kick && typeof t.drums.kick.vel === 'number') ? t.drums.kick.vel : 0.7;
      Sequencer._blendDrumVelScale = lerp(sVol / 0.7, tVol / 0.7);
    }
  },

  stop: function() {
    this._active = false;
    this._target = null;
    this._blendAmount = 0;
  },
};


// ── wavetables.js ──────────────────────────────────────────
// ── 03e_wavetables.js — Wavetable library (SPEC_016 §1) ──────────────────────
// Builds PeriodicWave objects from harmonic recipes.  Each palette × role
// combination gets a unique timbre.  Waves are lazily built on first request
// and cached for the run.
//
// Roles: kick, bass, snare, perc, pad, voice, melody
// Palettes: dark_techno, synthwave, glitch, ambient_dread, lo_fi_chill, chiptune

var Wavetables = (function() {
  'use strict';

  var _cache = {};  // key = 'paletteName:role' → PeriodicWave

  // ── Harmonic recipes ──────────────────────────────────────────────────────
  // Each recipe = { real: [...], imag: [...] }
  // Index 0 = DC offset (always 0), index 1 = fundamental, 2 = 2nd harmonic…
  // Amplitudes normalized — the Web Audio API normalizes PeriodicWave by default.

  // Helper: generate a recipe from a compact descriptor
  function _harmonics(partials) {
    // partials = array of [harmonicNumber, amplitude] pairs
    var maxN = 0;
    for (var i = 0; i < partials.length; i++) {
      if (partials[i][0] > maxN) maxN = partials[i][0];
    }
    var real = new Float32Array(maxN + 1);
    var imag = new Float32Array(maxN + 1);
    real[0] = 0; imag[0] = 0;
    for (var j = 0; j < partials.length; j++) {
      imag[partials[j][0]] = partials[j][1];
    }
    return { real: real, imag: imag };
  }

  // Helper: thick saw (all harmonics with 1/n rolloff, configurable brightness)
  function _thickSaw(nPartials, brightnessExp) {
    var p = [];
    var exp = brightnessExp || 1.0;
    for (var n = 1; n <= nPartials; n++) {
      p.push([n, Math.pow(1.0 / n, exp)]);
    }
    return _harmonics(p);
  }

  // Helper: hollow wave (odd harmonics only — square-ish)
  function _hollow(nPartials, rolloff) {
    var p = [];
    var ro = rolloff || 1.0;
    for (var n = 1; n <= nPartials; n += 2) {
      p.push([n, Math.pow(1.0 / n, ro)]);
    }
    return _harmonics(p);
  }

  // Helper: organ-like (select harmonics with drawbar amplitudes)
  function _organ(drawbars) {
    // drawbars = object { harmonicN: amplitude }
    var p = [];
    for (var h in drawbars) {

  // Helper: pulse wave (NES-style, duty cycle 0–1; 0.5 = square, 0.25 = 25%, 0.125 = 12.5%)

    // b_n = (2 / (n * pi)) * sin(n * pi * duty)
    var p = [];
    var n = nPartials || 32;
    for (var k = 1; k <= n; k++) {
      var amp = (2 / (k * Math.PI)) * Math.sin(k * Math.PI * duty);
      if (Math.abs(amp) > 0.001) p.push([k, Math.abs(amp)]);

    return _harmonics(p);

      perc:   _harmonics([[1, 0.8], [4, 0.6], [7, 0.4], [11, 0.3]]), // bell-like inharmonic

    },

    // ── synthwave ───────────────────────────────────────────────────────────

      bass:   _thickSaw(20, 1.0),                                     // classic analog saw
      snare:  _harmonics([[1, 0.2], [2, 0.4], [4, 0.6], [6, 0.5], [8, 0.3]]),  // snappy even partials
      perc:   _organ({1: 0.9, 3: 0.5, 5: 0.3}),                     // mellow triangle-ish
      pad:    _thickSaw(12, 1.4),                                     // warm saw pad (rolled off)
      voice:_hollow(10, 0.8),                                       // square-ish chiptune feel
      melody: _thickSaw(8, 1.0),                                      // analog mono lead — warm, fewer harmonics than pad

    },
  };

// ── groove.js ──────────────────────────────────────────
// ========== GROOVE ENGINE — Swing, Humanization, Probability Scaling ==========
// SPEC_018 §1 — Session 1
//
// Applies timing deviation and ghost-note probability scaling to the sequencer.
// Called by Sequencer.tick() to compute:
//   - swing offset per step index (even steps delayed)
//   - humanize jitter (±ms, random per note)
//   - probability multiplier per phase (scales ghost note fire rate)
//
// Phase scaling table (SPEC_018 §1):
//   Pulse:     humanize ×1.0, swing ×1.0,  prob ×0.5
//   Swell:     humanize ×1.2, swing ×1.0,  prob ×1.0
//   Surge:     humanize ×1.0, swing ×1.3,  prob ×1.3
//   Storm:     humanize ×0.5, swing ×1.0,  prob ×1.5
//   Maelstrom: humanize ×2.0, swing ×1.5,  prob ×2.0 (ghost prob clamped to 0.8)

var GrooveEngine = {
  // Active values — updated on phase change and palette init
  _swingBase:    0.0,   // from palette.groove.swing
  _humanizeBase: 5,     // from palette.groove.humanize (ms)

  // Phase multipliers (active)
  _swingMult:    1.0,
  _humanizeMult: 1.0,
  _probMult:     0.5,   // start conservative at Pulse

  // Phase scaling tables
  _PHASE_SWING_MULT:    { pulse: 1.0, swell: 1.0, surge: 1.3, storm: 1.0, maelstrom: 1.5 },
  _PHASE_HUMANIZE_MULT: { pulse: 1.0, swell: 1.2, surge: 1.0, storm: 0.5, maelstrom: 2.0 },
  _PHASE_PROB_MULT:     { pulse: 0.5, swell: 1.0, surge: 1.3, storm: 1.5, maelstrom: 2.0 },

  // Initialize from palette at run start
  initRun: function(palette) {
    var g = palette.groove || {};
    this._swingBase    = g.swing     !== undefined ? g.swing     : 0.0;
    this._humanizeBase = g.humanize  !== undefined ? g.humanize  : 5;
    // Start at Pulse phase defaults
    this._swingMult    = 1.0;
    this._humanizeMult = 1.0;
    this._probMult     = 0.5;
  },

  // Called by StateMapper when phase changes
  onPhaseChange: function(newPhase) {
    var ph = newPhase || 'pulse';
    this._swingMult    = this._PHASE_SWING_MULT[ph]    || 1.0;
    this._humanizeMult = this._PHASE_HUMANIZE_MULT[ph] || 1.0;
    this._probMult     = this._PHASE_PROB_MULT[ph]     || 1.0;
  },

  // Compute timing offset (seconds) for a given 16th-note step.
  // stepIndex: 0–15 within the bar.
  // subDurSecs: duration of one 16th note in seconds.
  getTimingOffset: function(stepIndex, subDurSecs) {
    var offset = 0;

    // Swing: delay odd-indexed steps (1,3,5,7,9,11,13,15)
    if (stepIndex % 2 === 1) {
      var swing = this._swingBase * this._swingMult;
      offset += swing * subDurSecs * 0.5;
    }

    // Humanize: random ±ms deviation
    var humanizeMs  = this._humanizeBase * this._humanizeMult;
    var humanizeSec = ((_songRng || Math.random)() * 2 - 1) * humanizeMs / 1000;
    offset += humanizeSec;

    return offset;
  },

  // Should this step fire? Applies probability + phase scaling.
  // step: { active, vel, prob? }
  // Returns true if the step should play this bar.
  shouldFire: function(step) {
    if (!step || !step.active) return false;
    // No prob field = always fire (backwards-compat with bass/non-ghost steps)
    if (step.prob === undefined || step.prob === null) return true;
    // prob 1.0 = deterministic
    if (step.prob >= 1.0) return true;

    // Scale ghost probability by phase multiplier, clamped to 0.8 max
    var scaledProb = Math.min(step.prob * this._probMult, 0.8);
    return (_songRng || Math.random)() < scaledProb;
  },
};
