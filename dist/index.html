        this._playMotifVariation('retrograde', t + 0.3, { volume: 0.35, tempoMult: 2.0 });
        this._deathStaggerFade(t, ['melody', 'perc', 'pad', 'snare', 'hat', 'bass'], 3.0);
        return { fadeDur: 3.0, silenceFirst: 0 };

      case 'storm':
        // Dissonant cluster chord. Resolves to root over 3s. Dramatic.
        this._deathClusterChord(t, beatDur);
        return { fadeDur: 3.5, silenceFirst: 0 };

      case 'maelstrom':
        // Everything freezes for 0.5s silence. Then motif at half speed, solo melody voice.
        // Return to where it started — original key.
        var self = this;
        var tid = setTimeout(function() {
          if (!audioCtx) return;
          var now = audioCtx.currentTime;
          self._refreshMotifMidi();
          self._playMotifVariation('original', now, { volume: 0.4, tempoMult: 2.0 });
        }, 500);
        this._introTimeouts.push(tid);
        return { fadeDur: 4.0, silenceFirst: 0.5 };

      default:
        // Fallback: original retrograde behavior
        this._playMotifVariation('retrograde', t + 0.3, { volume: 0.35, tempoMult: 2.0 });
        return { fadeDur: 2.5, silenceFirst: 0 };
    }
  },

  // Stagger track gain fadeouts for death sequence
  _deathStaggerFade: function(t, trackOrder, totalDur) {
    if (typeof _trackGains === 'undefined') return;
    var step = totalDur / Math.max(trackOrder.length, 1);
    for (var i = 0; i < trackOrder.length; i++) {
      var tg = _trackGains[trackOrder[i]];
      if (!tg) continue;
      var fadeStart = t + i * step;
      var fadeDur = step * 0.8;
      tg.gain.cancelScheduledValues(fadeStart);
      tg.gain.setValueAtTime(tg.gain.value || 1.0, fadeStart);
      tg.gain.linearRampToValueAtTime(0.0001, fadeStart + fadeDur);
    }
  },

  // Storm death: cluster chord (chord tones + chromatic neighbors) resolving to root
  _deathClusterChord: function(t, beatDur) {
    if (typeof HarmonyEngine === 'undefined') return;
    var chord = HarmonyEngine.getCurrentChord();
    if (!chord) return;
    var dest = (typeof _trackGains !== 'undefined' && _trackGains.pad) ? _trackGains.pad : submixGain;
    if (!dest || !audioCtx) return;

    // Chord tones + chromatic neighbors (±1 semitone each)
    var baseMidi = 3 * 12 + chord.rootSemitone;
    var clusterNotes = [];
    var tones = HarmonyEngine.getChordTones(3);
    for (var i = 0; i < tones.length; i++) {
      clusterNotes.push(tones[i]);
      clusterNotes.push(tones[i] + 1);
      clusterNotes.push(tones[i] - 1);
    }

    // Play cluster, then resolve each voice to nearest chord tone over 3s
    var rootFreq = (typeof midiToFreq === 'function') ? midiToFreq(baseMidi) : 220;
    for (var j = 0; j < clusterNotes.length; j++) {
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(dest);
      osc.type = 'triangle';

      var freq = (typeof midiToFreq === 'function') ? midiToFreq(clusterNotes[j]) : 220;
      osc.frequency.setValueAtTime(freq, t);
      // Resolve toward root over 3s
      osc.frequency.exponentialRampToValueAtTime(rootFreq, t + 3.0);

      gain.gain.setValueAtTime(0.08, t);
      gain.gain.linearRampToValueAtTime(0.0001, t + 3.5);
      osc.start(t);
      osc.stop(t + 3.6);
    }
  },

  // ── Instrument Introduction System (SPEC_020 §3) ───────────────────────────

  _clearIntroTimeouts: function() {
    for (var i = 0; i < this._introTimeouts.length; i++) {
      clearTimeout(this._introTimeouts[i]);
    }
    this._introTimeouts = [];
  },

  // Called from StateMapper when a track transitions muted→unmuted for the first time.
  // Schedules gain ramp + introduction figure per instrument.
  onTrackIntro: function(track, beatTime) {
    if (!this._active || !audioCtx) return;
    if (this._introduced[track]) return; // already introduced
    this._introduced[track] = true;

    var t = beatTime || audioCtx.currentTime;
    var beatDur = 60 / (G.bpm || 120);
    var tg = (typeof _trackGains !== 'undefined') ? _trackGains[track] : null;

    // Gain ramp: start silent, fade in over intro duration
    if (tg) {
      var rampBeats = 4;
      if (track === 'pad') rampBeats = 8;
      if (track === 'snare' || track === 'perc') rampBeats = 2;
      tg.gain.cancelScheduledValues(t);
      tg.gain.setValueAtTime(0.0001, t);
      tg.gain.linearRampToValueAtTime(1.0, t + rampBeats * beatDur);
    }

    // Per-instrument introduction figure
    switch (track) {
      case 'bass':
        this._introBassWalkUp(t, beatDur);
        break;
      case 'snare':
        this._introSnareAccent(t, beatDur);
        break;
      // hat: fade-in via gain ramp is the intro (materializing)
      // pad: 8-beat swell via gain ramp + PadTrack's own attack
      // perc: enters naturally during fill (FillSystem triggers at same time)
      // melody: motif solo already handled by onPhaseChange Swell
    }
  },

  // Bass: 4-note walk-up to root over 4 beats before settling into pattern
  _introBassWalkUp: function(t, beatDur) {
    if (typeof HarmonyEngine === 'undefined' || typeof _synthBass !== 'function') return;
    var pal = (typeof Sequencer !== 'undefined' && Sequencer._palette) ? Sequencer._palette : null;
    if (!pal || !pal.bass) return;

    var octave = pal.bass.octave || 2;
    var tones = HarmonyEngine.getChordTones(octave);
    if (!tones || tones.length === 0) return;
    var root = tones[0];

    // Walk up: root-5, root-3, root-1 semitone, root
    var walkNotes = [root - 5, root - 3, root - 1, root];
    var bassGain = (typeof _trackGains !== 'undefined' && _trackGains.bass) ? _trackGains.bass : null;

    for (var i = 0; i < walkNotes.length; i++) {
      var freq = (typeof midiToFreq === 'function') ? midiToFreq(walkNotes[i]) : 440;
      var vel = 0.4 + i * 0.15; // crescendo
      var noteTime = t + i * beatDur;
      // Temporarily boost bass gain for walk-up audibility during ramp
      if (bassGain) {
        bassGain.gain.cancelScheduledValues(noteTime);
        bassGain.gain.setValueAtTime(Math.max(0.3 + i * 0.2, 0.0001), noteTime);
      }
      _synthBass(noteTime, freq, vel,
        pal.bass.filterCutoff, pal.bass.filterResonance, pal.bass.wave);
    }
    // After walk-up, resume normal gain ramp to 1.0
    if (bassGain) {
      var endTime = t + 4 * beatDur;
      bassGain.gain.setValueAtTime(1.0, endTime);
    }
  },

  // Snare: single accent hit, then normal pattern starts next bar
  _introSnareAccent: function(t, beatDur) {
    if (typeof _dispatchDrumSynth !== 'function') return;
    var pal = (typeof Sequencer !== 'undefined' && Sequencer._palette) ? Sequencer._palette : null;
    if (!pal || !pal.drums || !pal.drums.snare) return;
    // Single accent on beat 2 (one beat after unmute)
    _dispatchDrumSynth('snare', t + beatDur, 0.9, pal.drums.snare);
  },

  // ── Re-entry rebuild (SPEC_020 §3) ────────────────────────────────────────
  // Called when hit-strip ends. Ramps track gains from 0→1 over 2 beats.
  onReentry: function(beatTime) {
    if (!this._active || !audioCtx) return;
    var t = beatTime || audioCtx.currentTime;
    var beatDur = 60 / (G.bpm || 120);
    var rampDur = 2 * beatDur;
    this._reentryUntil = G.beatCount + 2;

    var tracks = ['hat', 'snare', 'bass', 'pad', 'perc', 'melody'];
    for (var i = 0; i < tracks.length; i++) {
      var tg = (typeof _trackGains !== 'undefined') ? _trackGains[tracks[i]] : null;
      if (!tg) continue;
      // Only ramp tracks that are about to be unmuted
      var floor = CFG.PHASE_FLOOR[G.phase] || CFG.PHASE_FLOOR.pulse;
      var thresh = CFG.INTENSITY_LAYER_THRESHOLDS;
      var inFloor = !!floor[tracks[i]];
      var intensityUnlocked = G.intensity >= (thresh[tracks[i]] || Infinity);
      if (inFloor || intensityUnlocked) {
        tg.gain.cancelScheduledValues(t);
        tg.gain.setValueAtTime(0.0001, t);
        tg.gain.linearRampToValueAtTime(1.0, t + rampDur);
      }
    }
  },

  // ── Exit Figures (SPEC_020 §3 — hit-strip departure) ──────────────────────
  // Called from StateMapper.onHit before tracks are muted.
  playExitFigures: function(beatTime) {
    if (!this._active || !audioCtx) return;
    var t = beatTime || audioCtx.currentTime;
    var beatDur = 60 / (G.bpm || 120);
    var m = (typeof Sequencer !== 'undefined') ? Sequencer._mute : null;
    if (!m) return;
    var floor = CFG.PHASE_FLOOR[G.phase] || CFG.PHASE_FLOOR.pulse;

    // Only play exit for tracks that are currently unmuted and will be muted
    // Bass exit: bend down a semitone
    if (!m.bass && !floor.bass) {
      this._exitBassBend(t, beatDur);
    }
    // Hat exit: open hat (extended decay)
    if (!m.hat && !floor.hat) {
      this._exitHatOpen(t);
    }
    // Pad: already handled by PadTrack._fadeOutVoices()
  },

  // Bass: final note bends down a semitone
  _exitBassBend: function(t, beatDur) {
    if (typeof _synthBass !== 'function') return;
    var pal = (typeof Sequencer !== 'undefined' && Sequencer._palette) ? Sequencer._palette : null;
    if (!pal || !pal.bass) return;
    if (typeof HarmonyEngine === 'undefined') return;
    var tones = HarmonyEngine.getChordTones(pal.bass.octave || 2);
    if (!tones || tones.length === 0) return;

    // Play root, then bend down (use bass track gain which will be fading)
    var rootFreq = (typeof midiToFreq === 'function') ? midiToFreq(tones[0]) : 110;
    var bentFreq = rootFreq * 0.9439; // down 1 semitone
    // Create the bent bass note directly
    if (!audioCtx) return;
    var dest = (typeof _trackGains !== 'undefined' && _trackGains.bass) ? _trackGains.bass : submixGain;
    if (!dest) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(dest);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(rootFreq, t);
    osc.frequency.exponentialRampToValueAtTime(bentFreq, t + beatDur * 0.5);
    gain.gain.setValueAtTime(0.3 * CFG.GAIN.bass, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + beatDur * 0.6);
    osc.start(t);
    osc.stop(t + beatDur * 0.7);
  },

  // Hat: extended decay open hat sound
  _exitHatOpen: function(t) {
    if (typeof _dispatchDrumSynth !== 'function') return;
    var pal = (typeof Sequencer !== 'undefined' && Sequencer._palette) ? Sequencer._palette : null;
    if (!pal || !pal.drums || !pal.drums.hat) return;
    // Play an open hat (high vel, the synth naturally decays longer at higher vel)
    _dispatchDrumSynth('hat', t, 1.0, pal.drums.hat);
  },

  // ── Expose motif for MelodyEngine phrase seeding ───────────────────────────
  // Returns current motif degrees for MelodyEngine to use as phrase source material
  getMotifDegrees: function() {
    return this._motif ? this._motif.degrees.slice() : null;
  },

  getMotifMidi: function() {
    if (!this._motifMidi) this._refreshMotifMidi();
    return this._motifMidi ? this._motifMidi.slice() : null;
  },

  // ══════════════════════════════════════════════════════════════════════════
  // STREAK MILESTONES (SPEC_020 §5) — narrative-level graze streak rewards
  // Milestones at 3/5/8/12/20+. Reset on hit via resetStreakMilestones().
  // ══════════════════════════════════════════════════════════════════════════

  _streakMilestonesHit: {},   // { 3: true, 5: true, ... } per-run
  _streakOctaveShiftActive: false,
  _streakUnison: false,       // true when next-downbeat unison is armed

  resetStreakMilestones: function() {
    this._streakMilestonesHit = {};
    // Restore voice pool octave if shifted
    if (this._streakOctaveShiftActive) {
      this._streakOctaveShiftActive = false;
      this._restoreVoiceOctave();
    }
    this._streakUnison = false;
  },

  // Called from StateMapper.registerNearMiss
  onGrazeStreak: function(streak) {
    if (!this._active || !audioCtx) return;
    var t = audioCtx.currentTime;
    var beatDur = 60 / G.bpm;

    // Streak 3: rising 3-note figure (confirmation)
    if (streak >= 3 && !this._streakMilestonesHit[3]) {
      this._streakMilestonesHit[3] = true;
      this._playRisingFigure(t, beatDur);
    }

    // Streak 5: voice pool shifts up an octave (brightening)
    if (streak >= 5 && !this._streakMilestonesHit[5]) {
      this._streakMilestonesHit[5] = true;
      this._shiftVoiceOctave(12); // +12 semitones = 1 octave
      this._streakOctaveShiftActive = true;
    }

    // Streak 8: bass fill figure (celebration)
    if (streak >= 8 && !this._streakMilestonesHit[8]) {
      this._streakMilestonesHit[8] = true;
      this._playBassCelebration(t, beatDur);
    }

    // Streak 12: arm unison hit on next downbeat (punctuation)
    if (streak >= 12 && !this._streakMilestonesHit[12]) {
      this._streakMilestonesHit[12] = true;
      this._streakUnison = true; // consumed in onBeat → _fireStreakUnison
    }

    // Streak 20+: motif transposed up a 4th (triumph)
    if (streak >= 20 && !this._streakMilestonesHit[20]) {
      this._streakMilestonesHit[20] = true;
      this._playStreakMotif(t, beatDur);
    }
  },

  // Streak 3: rising 3-note melody figure
  _playRisingFigure: function(t, beatDur) {
    if (typeof MelodyEngine === 'undefined' || typeof HarmonyEngine === 'undefined') return;
    var tones = HarmonyEngine.getChordTones(5);
    if (!tones || tones.length < 3) return;
    // Pick root, 3rd, 5th ascending
    var dur = beatDur * 0.2;
    var gain = 0.45;
    for (var i = 0; i < 3; i++) {
      MelodyEngine._playMelodyNote(tones[i], t + i * dur, gain, dur * 0.8);
    }
  },

  // Streak 5: shift active voice pool up 12 semitones
  _shiftVoiceOctave: function(semitones) {
    if (typeof VoicePool === 'undefined') return;
    var pool = VoicePool._pool;
    for (var i = 0; i < pool.length; i++) {
      var v = pool[i];
      if (v.active && v.osc) {
        try {
          v.osc.detune.setTargetAtTime(semitones * 100, audioCtx.currentTime, 0.05);
        } catch(e) {}
      }
    }
    // Store shift so new spawns also get it
    VoicePool._streakDetune = semitones * 100;
  },

  _restoreVoiceOctave: function() {
    if (typeof VoicePool === 'undefined') return;
    var pool = VoicePool._pool;
    for (var i = 0; i < pool.length; i++) {
      var v = pool[i];
      if (v.active && v.osc) {
        try {
          v.osc.detune.setTargetAtTime(0, audioCtx.currentTime, 0.1);
        } catch(e) {}
      }
    }
    VoicePool._streakDetune = 0;
  },

  // Streak 8: bass celebration fill — root→5th→octave→5th descending
  _playBassCelebration: function(t, beatDur) {
    if (!audioCtx || typeof HarmonyEngine === 'undefined') return;
    var tones = HarmonyEngine.getChordTones(2); // octave 2 for bass
    if (!tones || tones.length < 2) return;
    var root = tones[0];
    var fifth = tones.length >= 2 ? tones[1] : root + 7;
    var notes = [root, fifth, root + 12, fifth];
    var stepDur = beatDur * 0.2;
    var gain = CFG.GAIN.bass_fill || 0.12;
    for (var i = 0; i < notes.length; i++) {
      var freq = (typeof midiToFreq === 'function') ? midiToFreq(notes[i]) : 65.4;
      var osc = audioCtx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      var filt = audioCtx.createBiquadFilter();
      filt.type = 'lowpass';
      filt.frequency.value = 800;
      var env = audioCtx.createGain();
      var noteStart = t + i * stepDur;
      env.gain.setValueAtTime(0.0001, noteStart);
      env.gain.linearRampToValueAtTime(gain, noteStart + 0.015);
      env.gain.exponentialRampToValueAtTime(0.0001, noteStart + stepDur - 0.01);
      osc.connect(filt);
      filt.connect(env);
      env.connect(_trackGains.bass || submixGain);
      osc.start(noteStart);
      osc.stop(noteStart + stepDur + 0.02);
    }
  },

  // Streak 12: unison hit — all instruments sync on next downbeat
  _fireStreakUnison: function(beatTime) {
    if (!audioCtx) return;
    var t = beatTime;
    var beatDur = 60 / G.bpm;

    // Short 0.05s silence (micro-gap for dramatic effect)
    // Then all drums fire simultaneously with accent velocity
    if (typeof Sequencer !== 'undefined' && Sequencer._palette) {
      var d = Sequencer._palette.drums;
      _dispatchDrumSynth('kick', t + 0.05, 1.0, d.kick);
      _dispatchDrumSynth('snare', t + 0.05, 0.9, d.snare);
      _dispatchDrumSynth('hat', t + 0.05, 0.8, d.hat);
    }

    // Bass root note accent
    if (typeof HarmonyEngine !== 'undefined') {
      var tones = HarmonyEngine.getChordTones(2);
      if (tones && tones.length > 0) {
        var freq = (typeof midiToFreq === 'function') ? midiToFreq(tones[0]) : 65.4;
        var osc = audioCtx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        var env = audioCtx.createGain();
        env.gain.setValueAtTime(0.15, t + 0.05);
        env.gain.exponentialRampToValueAtTime(0.0001, t + 0.05 + beatDur * 0.5);
        osc.connect(env);
        env.connect(_trackGains.bass || submixGain);
        osc.start(t + 0.05);
        osc.stop(t + 0.05 + beatDur * 0.6);
      }
    }

    // Pad chord stab
    if (typeof PadTrack !== 'undefined' && !Sequencer._mute.pad) {
      PadTrack.tick(t + 0.05);
    }
  },

  // Streak 20+: motif transposed up a perfect 4th (5 semitones)
  _playStreakMotif: function(t, beatDur) {
    if (!this._motifMidi) this._refreshMotifMidi();
    if (!this._motifMidi) return;
    // Transpose up a 4th (5 semitones)
    var transposed = [];
    for (var i = 0; i < this._motifMidi.length; i++) {
      transposed.push(this._motifMidi[i] + 5);
    }
    var rhythm = this._motif.rhythm;
    for (var j = 0; j < transposed.length; j++) {
      var dur = beatDur * (rhythm[j] || 1.0);
      if (typeof MelodyEngine !== 'undefined') {
        MelodyEngine._playMelodyNote(transposed[j], t, 0.65, dur);
      }
      t += dur;
    }
  },

  // ══════════════════════════════════════════════════════════════════════════
  // DELIBERATE SILENCE (SPEC_020 §8) — dramatic pauses in the arrangement
  // ══════════════════════════════════════════════════════════════════════════

  _silenceState: null,  // { type, endBeat } when a silence is active
  _firstHitSilenced: false,
  _intensity50Silenced: false,
  _prePhaseDropBeat: 0,

  // Check & schedule silence on beat (called from onBeat)
  _checkSilenceMoments: function(beatTime) {
    var beatDur = 60 / G.bpm;

    // Active silence: restore when endBeat reached
    if (this._silenceState && G.beatCount >= this._silenceState.endBeat) {
      this._endSilence(beatTime);
    }

    // Intensity 50: 2-beat drum cut, pad sustains (SPEC_020 §8)
    if (G.intensity === 50 && !this._intensity50Silenced) {
      this._intensity50Silenced = true;
      this._beginSilence('intensity_50', G.beatCount + 2, beatTime);
    }

    // Streak 12 unison: fire on downbeat if armed
    if (this._streakUnison && G.beatCount % 4 === 0) {
      this._streakUnison = false;
      this._fireStreakUnison(beatTime);
    }
  },

  // Phase transition silence: 1-beat full stop (called from onPhaseChange)
  schedulePhaseTransitionSilence: function(beatTime) {
    this._beginSilence('phase_pause', G.beatCount + 1, beatTime);
  },

  // Pre-phase tension: snare+hat drop 4 beats before phase transition
  // Called from StateMapper.update when approaching phase threshold
  schedulePrePhaseTension: function(beatTime) {
    if (this._prePhaseDropBeat > 0 && G.beatCount < this._prePhaseDropBeat + 4) return; // already active
    this._prePhaseDropBeat = G.beatCount;
    this._beginSilence('pre_phase', G.beatCount + 4, beatTime);
  },

  // First hit in a run: 1-beat bass+drum cut (called from onHit)
  scheduleFirstHitSilence: function(beatTime) {
    if (this._firstHitSilenced) return;
    this._firstHitSilenced = true;
    this._beginSilence('first_hit', G.beatCount + 1, beatTime);
  },

  // Maelstrom intimate moment: 4 beats everything except motif at half volume
  scheduleMaelstromIntimacy: function(beatTime) {
    this._beginSilence('maelstrom_intimate', G.beatCount + 4, beatTime);
  },

  _beginSilence: function(type, endBeat, beatTime) {
    if (this._silenceState) return; // don't stack silences
    this._silenceState = { type: type, endBeat: endBeat };

    if (typeof Sequencer === 'undefined' || !audioCtx) return;
    var t = beatTime || audioCtx.currentTime;

    switch (type) {
      case 'phase_pause':
        // Full stop: all track gains → 0 for 1 beat
        this._duckAllTracks(t, 0.01);
        break;

      case 'combo_50':
        // Drums cut, pad sustains alone
        this._duckTracks(['kick', 'snare', 'hat', 'perc'], t, 0.01);
        break;

      case 'first_hit':
        // Bass + drums cut for 1 beat (shock)
        this._duckTracks(['kick', 'snare', 'hat', 'bass', 'perc'], t, 0.01);
        break;

      case 'maelstrom_intimate':
        // Everything to half volume except melody (motif plays through)
        this._duckTracks(['kick', 'snare', 'hat', 'bass', 'pad', 'perc'], t, 0.5);
        break;

      case 'pre_phase':
        // Snare + hat drop out
        this._duckTracks(['snare', 'hat'], t, 0.01);
        break;
    }
  },

  _endSilence: function(beatTime) {
    if (!this._silenceState || typeof Sequencer === 'undefined' || !audioCtx) {
      this._silenceState = null;
      return;
    }
    var t = beatTime || audioCtx.currentTime;
    var type = this._silenceState.type;
    this._silenceState = null;

    // Restore all track gains over 0.5 beats
    var rampTime = (60 / G.bpm) * 0.5;
    var tracks = ['kick', 'snare', 'hat', 'bass', 'pad', 'perc', 'melody'];
    for (var i = 0; i < tracks.length; i++) {
      var g = _trackGains[tracks[i]];
      if (g) {
        g.gain.cancelScheduledValues(t);
        g.gain.setTargetAtTime(1.0, t, rampTime * 0.3);
      }
    }
  },

  // Duck specific tracks to a target gain
  _duckTracks: function(trackNames, t, targetGain) {
    for (var i = 0; i < trackNames.length; i++) {
      var g = _trackGains[trackNames[i]];
      if (g) {
        g.gain.cancelScheduledValues(t);
        g.gain.setTargetAtTime(targetGain, t, 0.02);
      }
    }
  },

  // Duck all tracks
  _duckAllTracks: function(t, targetGain) {
    var tracks = ['kick', 'snare', 'hat', 'bass', 'pad', 'perc', 'melody'];
    this._duckTracks(tracks, t, targetGain);
  },

  // ── Shutdown ───────────────────────────────────────────────────────────────
  shutdown: function() {
    this._active = false;
    this._motif = null;
    this._motifMidi = null;
    this._palette = null;
    this._introduced = {};
    this._reentryUntil = 0;
    this._streakMilestonesHit = {};
    this._streakOctaveShiftActive = false;
    this._streakUnison = false;
    this._silenceState = null;
    this._firstHitSilenced = false;
    this._intensity50Silenced = false;
    this._prePhaseDropBeat = 0;
    if (this._canonVoiceTimeout) {
      clearTimeout(this._canonVoiceTimeout);
      this._canonVoiceTimeout = null;
    }
    this._clearIntroTimeouts();
  }
};


// ── conductor.js ──────────────────────────────────────────
// ========== VIRTUAL CONDUCTOR ==========
// Replaces the game loop. Simulates phase progression, intensity ramp,
// and musical events so the audio engine plays a full song autonomously.

var Conductor = (function() {
  var _running = false;
  var _paused = false;
  var _autoIntensity = true;  // simulate intensity ramp
  var _autoPhase = true;      // let DC drive phase transitions
  var _manualPhase = null;    // override phase when autoPhase=false
  var _intensityRate = 1;     // intensity increment per beat (simulate player skill)

  // ── Cycle mode state (SPEC_008 §6) ────────────────────────────────────────
  var _cycleState = null;           // null | 'decay' | 'bridge' | 'rebuild'
  var _cycleBeats = 0;              // beats elapsed in current cycle state
  var _maelstromSustainTarget = 0;  // bars to sustain before decay triggers
  var _maelstromSustainBeats = 0;   // beats counted in Maelstrom sustain
  var _nextPalette = null;          // palette selected during bridge
  var _frozenIntensity = 0;         // intensity frozen at decay start

  // Convert bars to beats (4/4 time)
  function _barsToBts(bars) { return bars * 4; }

  // ── Maelstrom sustain check (SPEC_008 §2) ─────────────────────────────────
  function _checkMaelstromSustain(beatTime) {
    if (!G.settings.cycleMode) return;
    if (_cycleState !== null) return;       // already transitioning
    if (G.phase !== 'maelstrom') return;

    _maelstromSustainBeats++;
    if (_maelstromSustainBeats >= _barsToBts(_maelstromSustainTarget)) {
      _enterDecay(beatTime);
    }
  }

  // Called when phase changes to maelstrom — set the sustain timer
  function _onMaelstromEntry() {
    var min = CFG.CYCLE.MAELSTROM_SUSTAIN_MIN;
    var max = CFG.CYCLE.MAELSTROM_SUSTAIN_MAX;
    _maelstromSustainTarget = min + Math.floor((_songRng || Math.random)() * (max - min + 1));
    _maelstromSustainBeats = 0;
  }

  // ── Cycle state transitions (SPEC_008 §3/§4/§5/§6) ───────────────────────
  function _enterDecay(beatTime) {
    _cycleState = 'decay';
    _cycleBeats = 0;
    _frozenIntensity = G.intensity;
    // Cancel any active phase stagger — cycle choreography takes over (SPEC_010 §5.5)
    if (typeof StateMapper !== 'undefined') StateMapper.cancelStagger();
    // Schedule staggered gain ramps downward (SPEC_008 §3)
    if (typeof StateMapper !== 'undefined') StateMapper.startCycleDecay(beatTime);
    console.log('[Conductor] Cycle: entering decay (' + CFG.CYCLE.DECAY_BARS + ' bars)');
  }

  function _enterBridge(beatTime) {
    _cycleState = 'bridge';
    _cycleBeats = 0;
    console.log('[Conductor] Cycle: entering bridge (' + CFG.CYCLE.BRIDGE_BARS + ' bars)');
  }

  function _enterRebuild(beatTime) {
    _cycleState = 'rebuild';
    _cycleBeats = 0;
    _nextPalette = null; // swap is done — clear so UI no longer shows "old → new"
    // Schedule staggered gain ramps upward from 0 (SPEC_008 §5)
    if (typeof StateMapper !== 'undefined') StateMapper.startCycleRebuild(beatTime, _frozenIntensity);
    console.log('[Conductor] Cycle: entering rebuild (' + CFG.CYCLE.REBUILD_BARS + ' bars)');
  }

  function _exitCycle() {
    _cycleState = null;
    _cycleBeats = 0;
    _nextPalette = null;
    _maelstromSustainBeats = 0;
    // Hand gain control back to StateMapper._updateLayers (SPEC_008 §5)
    if (typeof StateMapper !== 'undefined') StateMapper.endCycleRebuild();
    // Enter at Swell — the cycle transition *was* Pulse, new palette picks up from Swell onward.
    // Back-compute a beatCountCycleBase so the power curve lands at exactly dc=0.30 (Swell threshold)
    // on the very next updateDC tick, giving a continuous arc without a Pulse snap.
    var moodKey = (CFG.MOODS[G.settings.mood] || CFG.MOODS[1]).name.toLowerCase();
    var curve = CFG.DIFFICULTY.CURVES[moodKey] || CFG.DIFFICULTY.CURVES.normal;
    var swellDC = 0.30; // CFG.PHASES[1].dc
    // beat that produces swellDC on the power curve: beat = scale * dc^(1/exp)
    var swellBeat = Math.round(curve.scale * Math.pow(swellDC, 1 / curve.exp));
    G.beatCountCycleBase = G.beatCount - swellBeat;

    var oldPhase = G.phase;
    G.phase = 'swell';
    G.phaseEntryBeat = G.beatCount;
    G.dc = swellDC;
    for (var j = 0; j < G._phaseChangeListeners.length; j++) {
      G._phaseChangeListeners[j]('swell', oldPhase, 0);
    }
    console.log('[Conductor] Cycle: rebuild complete, entering at swell (cycleBeat=' + swellBeat + ')');
  }

  // ── Palette swap during bridge (SPEC_008 §4) ─────────────────────────────
  function _doPaletteSwap() {
    // 1. Select next palette
    _nextPalette = _selectPalette();
    var paletteIdx = (typeof PALETTES !== 'undefined') ? PALETTES.indexOf(_nextPalette) : 0;

    // 2. New seed + PRNG
    G.songSeed = paletteIdx * 10000 + Math.floor(Math.random() * 10000);
    _songRng = _createSongRng(G.songSeed);

    // 3–4. Re-init subsystems (NOT full resetRun — preserve beatCount, audio graph, beat clock)
    if (typeof HarmonyEngine !== 'undefined') HarmonyEngine.initRun(_nextPalette);
    if (typeof PaletteBlender !== 'undefined') PaletteBlender.initRun(_nextPalette);
    if (typeof Sequencer !== 'undefined') Sequencer.initRun(_nextPalette);
    if (typeof VoicePool !== 'undefined') VoicePool.initRun(_nextPalette);
    if (typeof NarrativeConductor !== 'undefined') NarrativeConductor.initRun(_nextPalette);
    if (typeof StateMapper !== 'undefined') {
      StateMapper.initRun();
      // Re-freeze after initRun reset — we're still in bridge, ramps not yet started (SPEC_008 §4)
      StateMapper._cycleFrozen = true;
    }

    // 5. Auto BPM from new palette's range
    if (G.settings.bpmOverride === null) {
      var range = _nextPalette.bpmRange;
      G.bpm = range[0] + Math.floor((_songRng || Math.random)() * (range[1] - range[0] + 1));
    }

    // 6. Regenerate TensionMap for new palette (SPEC_011 §3.1 / §5.2)
    if (typeof TensionMap !== 'undefined') TensionMap.generate(_songRng, _nextPalette);

    console.log('[Conductor] Cycle: palette swapped to ' + _nextPalette.name +
                ' (seed=' + G.songSeed + ', bpm=' + G.bpm + ')');
  }

  // ── Cycle beat processing ─────────────────────────────────────────────────
  function _processCycleBeat(beatTime) {
    if (_cycleState === null) return;

    _cycleBeats++;

    if (_cycleState === 'decay') {
      // Freeze intensity during decay (SPEC_008 §3)
      G.intensity = _frozenIntensity;
      if (_cycleBeats >= _barsToBts(CFG.CYCLE.DECAY_BARS)) {
        _enterBridge(beatTime);
      }
    } else if (_cycleState === 'bridge') {
      G.intensity = _frozenIntensity;
      // Palette swap on first beat of bridge (SPEC_008 §4)
      if (_cycleBeats === 1) {
        _doPaletteSwap();
      }
      if (_cycleBeats >= _barsToBts(CFG.CYCLE.BRIDGE_BARS)) {
        _enterRebuild(beatTime);
      }
    } else if (_cycleState === 'rebuild') {
      // Intensity stays frozen until rebuild completes
      G.intensity = _frozenIntensity;
      if (_cycleBeats >= _barsToBts(CFG.CYCLE.REBUILD_BARS)) {
        _exitCycle();
      }
    }
  }

  function _onBeat(beatTime) {
    if (!_running) return;

    G.beatCount++;
    G.beatsSinceHit++;

    // ── Tension suppression (SPEC_011 §5.1/§5.2) ─────────────────────────
    if (typeof TensionMap !== 'undefined') {
      TensionMap.setSuppressed(_cycleState !== null || !_autoPhase);
    }

    // ── Cycle state processing (before normal phase logic) ──────────────
    if (_cycleState !== null) {
      _processCycleBeat(beatTime);
    } else {
      // DC + phase progression (only when not in cycle transition)
      if (_autoPhase) {
        var prevPhase = G.phase;
        updateDC(beatTime);
        // Detect Maelstrom entry to start sustain timer
        if (G.phase === 'maelstrom' && prevPhase !== 'maelstrom') {
          _onMaelstromEntry();
        }
      } else if (_manualPhase && _manualPhase !== G.phase) {
        // Force phase — detect Maelstrom entry to start sustain timer
        var oldPhase = G.phase;
        var wasManualMaelstrom = (_manualPhase === 'maelstrom' && G.phase !== 'maelstrom');
        G.phase = _manualPhase;
        G.phaseEntryBeat = G.beatCount;
        for (var j = 0; j < G._phaseChangeListeners.length; j++) {
          G._phaseChangeListeners[j](_manualPhase, oldPhase, beatTime);
        }
        if (wasManualMaelstrom) {
          _onMaelstromEntry();
        }
      }

      // Check Maelstrom sustain regardless of auto/manual phase mode
      if (G.phase === 'maelstrom') {
        _checkMaelstromSustain(beatTime);
      }

      // Virtual intensity ramp (only when not in cycle transition)
      if (_autoIntensity) {
        G.intensity += _intensityRate;
        G.bestIntensity = Math.max(G.bestIntensity, G.intensity);
      }
    }

    // Score
    G.score += 10 + Math.floor(G.intensity * 0.5);

    // Advance audio subsystems
    if (typeof HarmonyEngine !== 'undefined') HarmonyEngine.advanceBeat();
    if (typeof Sequencer !== 'undefined') Sequencer.tick(beatTime);
    if (typeof StateMapper !== 'undefined') StateMapper.update(beatTime);
    if (typeof MelodyEngine !== 'undefined') MelodyEngine.updateIntensity(G.intensity);
    if (typeof NarrativeConductor !== 'undefined') NarrativeConductor.onBeat(beatTime);
    if (typeof PaletteBlender !== 'undefined') PaletteBlender.onBeat();
    if (typeof GrooveEngine !== 'undefined') GrooveEngine.onPhaseChange(G.phase);

    // Dispatch beat event for UI (extended with cycleState — SPEC_008 §9)
    if (typeof window !== 'undefined') {
      window.dispatchEvent(new CustomEvent('conductor:beat', {
        detail: {
          beat: G.beatCount, phase: G.phase, dc: G.dc,
          intensity: G.intensity, bpm: G.bpm,
          cycleState: _cycleState,
          nextPalette: (_cycleState && _nextPalette) ? _nextPalette.name : null
        }
      }));
    }
  }

  // ── Reset cycle state (called on stop and start) ──────────────────────────
  function _resetCycleState() {
    _cycleState = null;
    _cycleBeats = 0;
    _maelstromSustainTarget = 0;
    _maelstromSustainBeats = 0;
    _nextPalette = null;
    _frozenIntensity = 0;
  }

  return {
    start: function(seedOverride) {
      if (_running) this.stop();
      _running = true;
      _paused = false;
      _resetCycleState();

      resetRun(seedOverride);

      initAudio();
      // Resume AudioContext (may be suspended by autoplay policy or after stop()).
      // startBeatClock after context is running so scheduled times are valid.
      var self = this;
      var resumePromise = (audioCtx && audioCtx.state !== 'running')
        ? audioCtx.resume()
        : Promise.resolve();
      resumePromise.then(function() { startBeatClock(_onBeat); });
    },

    stop: function() {
      _running = false;
      _resetCycleState();
      stopBeatClock();
      // Suspend (not close) AudioContext so it can be reused next play.
      if (typeof audioCtx !== 'undefined' && audioCtx && audioCtx.state === 'running') {
        audioCtx.suspend();
      }
      if (typeof VoicePool !== 'undefined') VoicePool.shutdown();
      if (typeof StateMapper !== 'undefined') StateMapper.shutdown();
      if (typeof MelodyEngine !== 'undefined') MelodyEngine.shutdown();
      if (typeof NarrativeConductor !== 'undefined') NarrativeConductor.shutdown();
    },

    pause: function() {
      if (!_running || _paused) return;
      _paused = true;
      stopBeatClock();
    },

    resume: function() {
      if (!_running || !_paused) return;
      _paused = false;
      startBeatClock(_onBeat);
    },

    isRunning: function() { return _running; },
    isPaused: function() { return _paused; },

    // --- Cycle mode API (SPEC_008 §7) ---
    setCycleMode: function(v) {
      var was = G.settings.cycleMode;
      G.settings.cycleMode = !!v;
      // When turning cycle mode off, anchor beatCountCycleBase so updateDC
      // restarts its power curve from the current beat (avoids Maelstrom snap).
      if (was && !G.settings.cycleMode) {
        // Abort any in-progress cycle transition
        _resetCycleState();
        // Re-enter at Swell so the arc continues naturally (same logic as _exitCycle)
        var moodKey2 = (CFG.MOODS[G.settings.mood] || CFG.MOODS[1]).name.toLowerCase();
        var curve2 = CFG.DIFFICULTY.CURVES[moodKey2] || CFG.DIFFICULTY.CURVES.normal;
        var swellBeat2 = Math.round(curve2.scale * Math.pow(0.30, 1 / curve2.exp));
        G.beatCountCycleBase = G.beatCount - swellBeat2;
        G.dc = 0.30;
        var oldPhase2 = G.phase;
        G.phase = 'swell';
        G.phaseEntryBeat = G.beatCount;
        for (var j = 0; j < G._phaseChangeListeners.length; j++) {
          G._phaseChangeListeners[j]('swell', oldPhase2, 0);
        }
      }
      console.log('[Conductor] Cycle mode: ' + (G.settings.cycleMode ? 'ON' : 'OFF'));
    },
    isCycleMode: function() { return G.settings.cycleMode; },
    getCycleState: function() { return _cycleState; },

    // --- Palette lock ---
    lockPalette: function(idx) {
      // idx = 0-based palette index. Stores as 1-based in G.settings.palette.
      // _selectPalette() treats 0=random, 1..N=locked.
      if (typeof G !== 'undefined' && G.settings) {
        G.settings.palette = (idx >= 0) ? idx + 1 : 0;
      }
    },
    unlockPalette: function() {
      if (typeof G !== 'undefined' && G.settings) {
        G.settings.palette = 0;
      }
    },

    // --- Controls ---
    setAutoIntensity: function(v) { _autoIntensity = !!v; },
    setAutoPhase: function(v) { _autoPhase = !!v; },
    forcePhase: function(name) {
      // Locked during cycle transitions (SPEC_008 §10)
      if (_cycleState !== null) {
        console.log('[Conductor] forcePhase ignored — cycle transition in progress');
        return;
      }
      _autoPhase = false;
      _manualPhase = name;
    },
    setVolume: function(v) {
      G.settings.volume = Math.max(0, Math.min(1, v));
      applyVolumeSetting();
    },

    // --- BPM override ---
    setBPM: function(bpm) {
      // Clamp to slider range; takes effect on next beat (beat clock reads G.bpm dynamically)
      var clamped = Math.max(60, Math.min(200, Math.round(bpm)));
      G.settings.bpmOverride = clamped;
      G.bpm = clamped;
    },
    setAutoBPM: function() {
      G.settings.bpmOverride = null;
      // G.bpm stays at current value until next resetRun(); that's acceptable —
      // the user pressed Auto so the next Play will pick the natural palette BPM.
    },
    // Simulate a "hit" — drops intensity, triggers audio effects
    simulateHit: function() {
      G.intensity = 0;
      G.energy = Math.max(1, G.energy - 1);
      G.beatsSinceHit = 0;
      if (typeof StateMapper !== 'undefined') StateMapper.onHit();
      if (typeof playHitSFX === 'function') playHitSFX();
    },

    // Simulate graze event
    simulateGraze: function(tier) {
      tier = tier || 'normal';
      G.grazeStreak++;
      if (typeof StateMapper !== 'undefined') StateMapper.registerNearMiss(tier);
    },
  };
})();




// ── Palette dropdown population ──────────────────────────────────────────
(function() {
  var sel = document.getElementById('selPalette');
  if (typeof PALETTES !== 'undefined') {
    for (var i = 0; i < PALETTES.length; i++) {
      var opt = document.createElement('option');
      opt.value = i;
      opt.textContent = PALETTES[i].name || ('Palette ' + i);
      sel.appendChild(opt);
    }
  }
})();

// ── URL param helpers ────────────────────────────────────────────────────
function _getUrlParams() {
  var params = {};
  var search = window.location.search;
  if (!search) return params;
  search.slice(1).split('&').forEach(function(part) {
    var kv = part.split('=');
    if (kv.length === 2) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]);
  });
  return params;
}

function _pushUrlParams(seed, paletteIdx) {
  var base = window.location.pathname;
  var q = '?seed=' + seed;
  if (paletteIdx >= 0) q += '&palette=' + paletteIdx;
  window.history.replaceState(null, '', base + q);
}

// ── Transport controls ───────────────────────────────────────────────────
function doPlay() {
  var sel = document.getElementById('selPalette');
  var idx = parseInt(sel.value);

  // Pre-select palette from URL on first load only (when user hasn't picked one)
  var urlParams = _getUrlParams();
  if (urlParams.palette != null && sel.value === '-1') {
    var urlPal = parseInt(urlParams.palette, 10);
    if (urlPal >= 0) { sel.value = urlPal; idx = urlPal; }
  }

  if (idx >= 0) {
    Conductor.lockPalette(idx);
  } else {
    Conductor.unlockPalette();
  }
  // Always generate a fresh seed on Play — URL updates after to reflect new song
  Conductor.start(null);

  // Write URL params so this song can be shared/replayed
  // Seed is set by resetRun — read it back after a tick
  setTimeout(function() {
    if (typeof G !== 'undefined' && G.songSeed != null) {
      // Only write palette to URL if user explicitly locked one — random stays -1
      var lockedIdx = parseInt(document.getElementById('selPalette').value);
      _pushUrlParams(G.songSeed, lockedIdx);
      var seedEl = document.getElementById('statSeed');
      if (seedEl) seedEl.textContent = G.songSeed;
    }
  }, 50);
}
function doPause() {
  if (Conductor.isPaused()) Conductor.resume();
  else Conductor.pause();
}
function doStop() { Conductor.stop(); }

function onVolume(v) {
  document.getElementById('valVolume').textContent = v + '%';
  Conductor.setVolume(v / 100);
}
function onBPM(v) {
  var chk = document.getElementById('chkBPMAuto');
  chk.checked = false; // moving the slider means manual mode
  document.getElementById('valBPM').textContent = v;
  Conductor.setBPM(parseInt(v));
}
function onBPMAuto(checked) {
  if (checked) {
    document.getElementById('valBPM').textContent = 'Auto';
    Conductor.setAutoBPM();
  } else {
    var v = document.getElementById('slBPM').value;
    document.getElementById('valBPM').textContent = v;
    Conductor.setBPM(parseInt(v));
  }
}
function onCycleMode(checked) {
  Conductor.setCycleMode(checked);
}
function onPhase(p) {
  // Spec §10 edge case 5: force phase locked during cycle transition
  if (typeof Conductor !== 'undefined' && Conductor.getCycleState && Conductor.getCycleState()) return;
  document.querySelectorAll('.phase-pill').forEach(function(el) {
    el.classList.toggle('active', el.dataset.phase === p);
  });
  if (p === 'auto') {
    Conductor.setAutoPhase(true);
  } else {
    Conductor.forcePhase(p);
  }
}

// ── Status bar updates ───────────────────────────────────────────────────
window.addEventListener('conductor:beat', function(e) {
  var d = e.detail;
  document.getElementById('statBeat').textContent = d.beat;
  document.getElementById('statPhase').textContent = d.phase;
  document.getElementById('statDC').textContent = d.dc.toFixed(2);
  document.getElementById('statBPM').textContent = d.bpm;
  // Seed display (G.songSeed set after resetRun)
  if (typeof G !== 'undefined' && G.songSeed != null) {
    document.getElementById('statSeed').textContent = G.songSeed;
  }
  // Sync BPM slider to actual BPM when in Auto mode
  var chkAuto = document.getElementById('chkBPMAuto');
  if (chkAuto && chkAuto.checked) {
    document.getElementById('slBPM').value = d.bpm;
  }

  // Palette status: show "current → next" during transition (SPEC_008 §9)
  var palEl = document.getElementById('statPalette');
  if (d.cycleState && d.nextPalette) {
    var curPal = (typeof HarmonyEngine !== 'undefined' && HarmonyEngine.getPalette)
      ? (HarmonyEngine.getPalette() || {}).name || '—' : '—';
    palEl.textContent = curPal + ' → ' + d.nextPalette;
  } else if (typeof HarmonyEngine !== 'undefined' && HarmonyEngine.getPalette) {
    var pal = HarmonyEngine.getPalette();
    palEl.textContent = pal ? pal.name : '—';
  }

  // Cycle state label next to checkbox
  var cycleEl = document.getElementById('valCycleState');
  if (cycleEl) {
    cycleEl.textContent = d.cycleState ? d.cycleState : '';
  }

  // Phase pills: lock and show "Cycle" pill during transition (SPEC_008 §9)
  var pillsEl = document.getElementById('phasePills');
  var cyclePill = pillsEl ? pillsEl.querySelector('[data-phase="cycle"]') : null;
  if (d.cycleState) {
    if (pillsEl) pillsEl.classList.add('cycle-locked');
    if (cyclePill) { cyclePill.style.display = ''; cyclePill.classList.add('cycle-active'); }
  } else {
    if (pillsEl) pillsEl.classList.remove('cycle-locked');
    if (cyclePill) { cyclePill.style.display = 'none'; cyclePill.classList.remove('cycle-active'); }
  }

});

// ── FFT Visualizer (canvas-based, no Phaser) ─────────────────────────────
(function() {
  var canvas = document.getElementById('vizCanvas');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var CX = W / 2, CY = H / 2;
  var _fftData = new Uint8Array(64);
  var _frameCount = 0;
  var _beatFlash = 0;

  window.addEventListener('conductor:beat', function() { _beatFlash = 6; });

  function draw() {
    requestAnimationFrame(draw);
    _frameCount++;
    if (_frameCount % 3 !== 0) return; // 20fps

    ctx.clearRect(0, 0, W, H);

    // Get FFT data
    var analyser = (typeof getAnalyser === 'function') ? getAnalyser() : null;
    if (analyser) {
      analyser.getByteFrequencyData(_fftData);
    }

    // Phase config
    var phaseName = G.phase || 'pulse';
    var capPhase = phaseName.charAt(0).toUpperCase() + phaseName.slice(1);
    var cfg = CFG.VIZ.PHASE_CFG[capPhase] || [60, 50, 0.25];
    var baseR = cfg[0] * 2;     // scale up for 600px canvas
    var maxBar = cfg[1] * 2;
    var alphaCap = cfg[2];

    // Beat flash
    if (_beatFlash > 0) {
      _beatFlash--;
      maxBar *= 1.2;
    }

    // Draw ring
    var bins = _fftData.length;
    var angleStep = (Math.PI * 2) / bins;

    for (var i = 0; i < bins; i++) {
      var val = _fftData[i] / 255;
      var barH = val * maxBar;
      var angle = i * angleStep - Math.PI / 2;

      var x1 = CX + Math.cos(angle) * baseR;
      var y1 = CY + Math.sin(angle) * baseR;
      var x2 = CX + Math.cos(angle) * (baseR + barH);
      var y2 = CY + Math.sin(angle) * (baseR + barH);

      var alpha = Math.min(val * 0.8 + 0.1, alphaCap);
      ctx.strokeStyle = 'rgba(123, 43, 255, ' + alpha + ')';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    // Inner circle
    ctx.strokeStyle = 'rgba(123, 43, 255, 0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(CX, CY, baseR, 0, Math.PI * 2);
    ctx.stroke();

    // Phase label
    ctx.fillStyle = '#7b2fff';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(phaseName.toUpperCase(), CX, CY - 10);

    // DC value
    ctx.fillStyle = '#00ffcc';
    ctx.font = '24px monospace';
    ctx.fillText(G.dc.toFixed(2), CX, CY + 20);
  }

  draw();
})();
