<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmony Engine — Music Station</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    color: #aaaacc;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    color: #00ffcc;
    font-size: 28px;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .subtitle {
    color: #555577;
    font-size: 12px;
    margin-bottom: 24px;
  }

  /* Visualizer canvas */
  #vizCanvas {
    width: 600px;
    height: 600px;
    border: 1px solid #1a1a3a;
    border-radius: 8px;
    margin-bottom: 20px;
    background: #0a0a0f;
  }

  /* Status bar */
  .status {
    display: flex;
    gap: 24px;
    margin-bottom: 20px;
    font-size: 13px;
  }
  .status .label { color: #555577; }
  .status .value { color: #00ffcc; font-weight: bold; }
  .status .phase-value { color: #7b2fff; font-weight: bold; text-transform: uppercase; }

  /* Controls grid */
  .controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 640px;
    margin-bottom: 20px;
  }
  .panel {
    background: #0f0f1a;
    border: 1px solid #1a1a3a;
    border-radius: 8px;
    padding: 16px;
  }
  .panel h2 {
    color: #7b2fff;
    font-size: 13px;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Buttons */
  .btn {
    background: #1a1a3a;
    color: #00ffcc;
    border: 1px solid #00ffcc33;
    border-radius: 4px;
    padding: 10px 20px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
    min-width: 80px;
  }
  .btn:hover { background: #00ffcc22; }
  .btn:active { background: #00ffcc44; }
  .btn.primary { background: #00ffcc; color: #0a0a0f; font-weight: bold; }
  .btn.primary:hover { background: #00ddaa; }
  .btn.danger { border-color: #ff336644; color: #ff3366; }
  .btn.danger:hover { background: #ff336622; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

  /* Sliders */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .slider-row label {
    color: #555577;
    font-size: 12px;
    min-width: 70px;
  }
  .slider-row input[type=range] {
    flex: 1;
    accent-color: #00ffcc;
  }
  .slider-row .slider-val {
    color: #00ffcc;
    font-size: 12px;
    min-width: 36px;
    text-align: right;
  }

  /* Palette select */
  select {
    background: #1a1a3a;
    color: #aaaacc;
    border: 1px solid #1a1a3a;
    border-radius: 4px;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 13px;
    width: 100%;
    margin-bottom: 10px;
  }

  /* Phase pills */
  .phase-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .phase-pill {
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: 1px solid #1a1a3a;
    color: #555577;
    transition: all 0.2s;
  }
  .phase-pill.active {
    border-color: #7b2fff;
    color: #7b2fff;
    background: #7b2fff22;
  }
  .phase-pill:hover { border-color: #7b2fff88; }
  .phase-pill.cycle-active {
    border-color: #00ffcc;
    color: #00ffcc;
    background: #00ffcc22;
  }
  .phase-pills.cycle-locked .phase-pill { opacity: 0.3; cursor: default; pointer-events: none; }
  .phase-pills.cycle-locked .phase-pill.cycle-active { opacity: 1; pointer-events: auto; }
  .slider-row.dimmed label, .slider-row.dimmed .slider-val { opacity: 0.4; }
  .slider-row.dimmed input[type=range] { opacity: 0.4; pointer-events: none; }
</style>
</head>
<body>

<h1>HARMONY ENGINE</h1>
<p class="subtitle">Procedural music station — extracted from DemoShooter</p>

<canvas id="vizCanvas" width="600" height="600"></canvas>

<div class="status">
  <span><span class="label">Beat</span> <span class="value" id="statBeat">0</span></span>
  <span><span class="label">Phase</span> <span class="phase-value" id="statPhase">—</span></span>
  <span><span class="label">DC</span> <span class="value" id="statDC">0.00</span></span>
  <span><span class="label">BPM</span> <span class="value" id="statBPM">—</span></span>
  <span><span class="label">Palette</span> <span class="value" id="statPalette">—</span></span>
  <span><span class="label">Seed</span> <span class="value" id="statSeed">—</span></span>
</div>

<div class="controls">
  <!-- Transport -->
  <div class="panel">
    <h2>Transport</h2>
    <div class="btn-row">
      <button class="btn primary" id="btnPlay" onclick="doPlay()">PLAY</button>
      <button class="btn" id="btnPause" onclick="doPause()">PAUSE</button>
      <button class="btn danger" id="btnStop" onclick="doStop()">STOP</button>
    </div>
    <label style="font-size:12px; color:#555577;">Palette</label>
    <select id="selPalette">
      <option value="-1">Random</option>
    </select>
    <div class="slider-row">
      <label>Volume</label>
      <input type="range" min="0" max="100" value="80" id="slVolume" oninput="onVolume(this.value)">
      <span class="slider-val" id="valVolume">80%</span>
    </div>
    <div class="slider-row">
      <label>BPM</label>
      <input type="range" min="60" max="200" step="1" value="120" id="slBPM" oninput="onBPM(this.value)">
      <span class="slider-val" id="valBPM">Auto</span>
    </div>
    <div style="display:flex; align-items:center; gap:6px; margin-top:2px; margin-bottom:4px;">
      <input type="checkbox" id="chkBPMAuto" checked onchange="onBPMAuto(this.checked)">
      <label for="chkBPMAuto" style="font-size:12px; color:#555577; cursor:pointer;">Auto BPM</label>
    </div>
    <div style="display:flex; align-items:center; gap:6px; margin-top:6px; margin-bottom:4px;">
      <input type="checkbox" id="chkCycleMode" onchange="onCycleMode(this.checked)">
      <label for="chkCycleMode" style="font-size:12px; color:#555577; cursor:pointer;">Cycle Mode</label>
      <span id="valCycleState" style="font-size:11px; color:#00ffcc; margin-left:4px;"></span>
    </div>
  </div>

  <!-- Conductor -->
  <div class="panel">
    <h2>Conductor</h2>
    <label style="font-size:12px; color:#555577; margin-bottom:6px; display:block;">Force Phase</label>
    <div class="phase-pills" id="phasePills">
      <span class="phase-pill active" data-phase="auto" onclick="onPhase('auto')">Auto</span>
      <span class="phase-pill" data-phase="pulse" onclick="onPhase('pulse')">Pulse</span>
      <span class="phase-pill" data-phase="swell" onclick="onPhase('swell')">Swell</span>
      <span class="phase-pill" data-phase="surge" onclick="onPhase('surge')">Surge</span>
      <span class="phase-pill" data-phase="storm" onclick="onPhase('storm')">Storm</span>
      <span class="phase-pill" data-phase="maelstrom" onclick="onPhase('maelstrom')">Maelstrom</span>
      <span class="phase-pill" data-phase="cycle" style="display:none;">Cycle</span>
    </div>
    <div class="btn-row">
      <button class="btn danger" onclick="Conductor.simulateHit()">Sim Hit</button>
      <button class="btn" onclick="Conductor.simulateGraze('perfect')">Sim Graze</button>
    </div>
  </div>
</div>

<script>
/* __INJECT_JS__ */

// ── Palette dropdown population ──────────────────────────────────────────
(function() {
  var sel = document.getElementById('selPalette');
  if (typeof PALETTES !== 'undefined') {
    for (var i = 0; i < PALETTES.length; i++) {
      var opt = document.createElement('option');
      opt.value = i;
      opt.textContent = PALETTES[i].name || ('Palette ' + i);
      sel.appendChild(opt);
    }
  }
})();

// ── URL param helpers ────────────────────────────────────────────────────
function _getUrlParams() {
  var params = {};
  var search = window.location.search;
  if (!search) return params;
  search.slice(1).split('&').forEach(function(part) {
    var kv = part.split('=');
    if (kv.length === 2) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]);
  });
  return params;
}

function _pushUrlParams(seed, paletteIdx) {
  var base = window.location.pathname;
  var q = '?seed=' + seed;
  if (paletteIdx >= 0) q += '&palette=' + paletteIdx;
  window.history.replaceState(null, '', base + q);
}

// ── Transport controls ───────────────────────────────────────────────────
function doPlay() {
  var sel = document.getElementById('selPalette');
  var idx = parseInt(sel.value);

  // Pre-select palette from URL on first load only (when user hasn't picked one)
  var urlParams = _getUrlParams();
  if (urlParams.palette != null && sel.value === '-1') {
    var urlPal = parseInt(urlParams.palette, 10);
    if (urlPal >= 0) { sel.value = urlPal; idx = urlPal; }
  }

  if (idx >= 0) {
    Conductor.lockPalette(idx);
  } else {
    Conductor.unlockPalette();
  }
  // Always generate a fresh seed on Play — URL updates after to reflect new song
  Conductor.start(null);

  // Write URL params so this song can be shared/replayed
  // Seed is set by resetRun — read it back after a tick
  setTimeout(function() {
    if (typeof G !== 'undefined' && G.songSeed != null) {
      // Only write palette to URL if user explicitly locked one — random stays -1
      var lockedIdx = parseInt(document.getElementById('selPalette').value);
      _pushUrlParams(G.songSeed, lockedIdx);
      var seedEl = document.getElementById('statSeed');
      if (seedEl) seedEl.textContent = G.songSeed;
    }
  }, 50);
}
function doPause() {
  if (Conductor.isPaused()) Conductor.resume();
  else Conductor.pause();
}
function doStop() { Conductor.stop(); }

function onVolume(v) {
  document.getElementById('valVolume').textContent = v + '%';
  Conductor.setVolume(v / 100);
}
function onBPM(v) {
  var chk = document.getElementById('chkBPMAuto');
  chk.checked = false; // moving the slider means manual mode
  document.getElementById('valBPM').textContent = v;
  Conductor.setBPM(parseInt(v));
}
function onBPMAuto(checked) {
  if (checked) {
    document.getElementById('valBPM').textContent = 'Auto';
    Conductor.setAutoBPM();
  } else {
    var v = document.getElementById('slBPM').value;
    document.getElementById('valBPM').textContent = v;
    Conductor.setBPM(parseInt(v));
  }
}
function onCycleMode(checked) {
  Conductor.setCycleMode(checked);
}
function onPhase(p) {
  // Spec §10 edge case 5: force phase locked during cycle transition
  if (typeof Conductor !== 'undefined' && Conductor.getCycleState && Conductor.getCycleState()) return;
  document.querySelectorAll('.phase-pill').forEach(function(el) {
    el.classList.toggle('active', el.dataset.phase === p);
  });
  if (p === 'auto') {
    Conductor.setAutoPhase(true);
  } else {
    Conductor.forcePhase(p);
  }
}

// ── Status bar updates ───────────────────────────────────────────────────
window.addEventListener('conductor:beat', function(e) {
  var d = e.detail;
  document.getElementById('statBeat').textContent = d.beat;
  document.getElementById('statPhase').textContent = d.phase;
  document.getElementById('statDC').textContent = d.dc.toFixed(2);
  document.getElementById('statBPM').textContent = d.bpm;
  // Seed display (G.songSeed set after resetRun)
  if (typeof G !== 'undefined' && G.songSeed != null) {
    document.getElementById('statSeed').textContent = G.songSeed;
  }
  // Sync BPM slider to actual BPM when in Auto mode
  var chkAuto = document.getElementById('chkBPMAuto');
  if (chkAuto && chkAuto.checked) {
    document.getElementById('slBPM').value = d.bpm;
  }

  // Palette status: show "current → next" during transition (SPEC_008 §9)
  var palEl = document.getElementById('statPalette');
  if (d.cycleState && d.nextPalette) {
    var curPal = (typeof HarmonyEngine !== 'undefined' && HarmonyEngine.getPalette)
      ? (HarmonyEngine.getPalette() || {}).name || '—' : '—';
    palEl.textContent = curPal + ' → ' + d.nextPalette;
  } else if (typeof HarmonyEngine !== 'undefined' && HarmonyEngine.getPalette) {
    var pal = HarmonyEngine.getPalette();
    palEl.textContent = pal ? pal.name : '—';
  }

  // Cycle state label next to checkbox
  var cycleEl = document.getElementById('valCycleState');
  if (cycleEl) {
    cycleEl.textContent = d.cycleState ? d.cycleState : '';
  }

  // Phase pills: lock and show "Cycle" pill during transition (SPEC_008 §9)
  var pillsEl = document.getElementById('phasePills');
  var cyclePill = pillsEl ? pillsEl.querySelector('[data-phase="cycle"]') : null;
  if (d.cycleState) {
    if (pillsEl) pillsEl.classList.add('cycle-locked');
    if (cyclePill) { cyclePill.style.display = ''; cyclePill.classList.add('cycle-active'); }
  } else {
    if (pillsEl) pillsEl.classList.remove('cycle-locked');
    if (cyclePill) { cyclePill.style.display = 'none'; cyclePill.classList.remove('cycle-active'); }
  }

});

// ── FFT Visualizer (canvas-based, no Phaser) ─────────────────────────────
(function() {
  var canvas = document.getElementById('vizCanvas');
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var CX = W / 2, CY = H / 2;
  var _fftData = new Uint8Array(64);
  var _frameCount = 0;
  var _beatFlash = 0;

  window.addEventListener('conductor:beat', function() { _beatFlash = 6; });

  function draw() {
    requestAnimationFrame(draw);
    _frameCount++;
    if (_frameCount % 3 !== 0) return; // 20fps

    ctx.clearRect(0, 0, W, H);

    // Get FFT data
    var analyser = (typeof getAnalyser === 'function') ? getAnalyser() : null;
    if (analyser) {
      analyser.getByteFrequencyData(_fftData);
    }

    // Phase config
    var phaseName = G.phase || 'pulse';
    var capPhase = phaseName.charAt(0).toUpperCase() + phaseName.slice(1);
    var cfg = CFG.VIZ.PHASE_CFG[capPhase] || [60, 50, 0.25];
    var baseR = cfg[0] * 2;     // scale up for 600px canvas
    var maxBar = cfg[1] * 2;
    var alphaCap = cfg[2];

    // Beat flash
    if (_beatFlash > 0) {
      _beatFlash--;
      maxBar *= 1.2;
    }

    // Draw ring
    var bins = _fftData.length;
    var angleStep = (Math.PI * 2) / bins;

    for (var i = 0; i < bins; i++) {
      var val = _fftData[i] / 255;
      var barH = val * maxBar;
      var angle = i * angleStep - Math.PI / 2;

      var x1 = CX + Math.cos(angle) * baseR;
      var y1 = CY + Math.sin(angle) * baseR;
      var x2 = CX + Math.cos(angle) * (baseR + barH);
      var y2 = CY + Math.sin(angle) * (baseR + barH);

      var alpha = Math.min(val * 0.8 + 0.1, alphaCap);
      ctx.strokeStyle = 'rgba(123, 43, 255, ' + alpha + ')';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    // Inner circle
    ctx.strokeStyle = 'rgba(123, 43, 255, 0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(CX, CY, baseR, 0, Math.PI * 2);
    ctx.stroke();

    // Phase label
    ctx.fillStyle = '#7b2fff';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(phaseName.toUpperCase(), CX, CY - 10);

    // DC value
    ctx.fillStyle = '#00ffcc';
    ctx.font = '24px monospace';
    ctx.fillText(G.dc.toFixed(2), CX, CY + 20);
  }

  draw();
})();
</script>
</body>
</html>
